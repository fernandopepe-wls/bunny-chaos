  <!-- die -->
  <rect x="318" y="328" width="68" height="68" fill="#ffcc3d" rx="10" stroke="#b3791f" stroke-width="4"/>
  <circle cx="338" cy="348" r="6" fill="#0d0a1a"/>
  <circle cx="366" cy="376" r="6" fill="#0d0a1a"/>
  <circle cx="352" cy="362" r="6" fill="#0d0a1a"/>
</svg>
