}

// ========== RENDER ARENA ==========
function drawCarrotSword(x, y, angle, range, t){
  // t in [0,1] — usado pra trail/transparência
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  const len = range;
  // SWISH BLAST: trail vivo e amplo, decai rápido
  // banda externa amarela (mais larga, mais transparente)
  ctx.fillStyle = `rgba(255,220,90,${0.35*(1-t)})`;
  ctx.fillRect(4, -14, len-4, 28);
  // banda intermediária laranja
  ctx.fillStyle = `rgba(255,140,40,${0.55*(1-t)})`;
  ctx.fillRect(6, -9, len-4, 18);
  // núcleo branco-quente (só no início pra parecer "flash")
  if(t < 0.4){
    ctx.fillStyle = `rgba(255,247,224,${0.6*(1 - t/0.4)})`;
    ctx.fillRect(8, -3, len-8, 6);
  }

  // hilt (folhas verdes da cenoura)
  ctx.fillStyle = '#2aa860';
  ctx.fillRect(0, -4, 7, 8);
  ctx.fillStyle = '#4cf08e';
  ctx.fillRect(2, -6, 4, 3);
  ctx.fillRect(2, 3, 4, 3);
  ctx.fillRect(-1, -3, 3, 6);
  ctx.fillStyle = '#88f0a8';
  ctx.fillRect(3, -5, 2, 2);

  // corpo da lâmina (cenoura laranja, afina pra ponta)
  // segmento mais grosso perto do cabo
  ctx.fillStyle = '#cc4a0a';
  ctx.fillRect(7, -4, len-18, 8);
  ctx.fillStyle = '#ff7a1a';
  ctx.fillRect(7, -3, len-18, 6);
  ctx.fillStyle = '#ff9b3a';
  ctx.fillRect(7, -2, len-18, 2);

  // ponta cônica (degraus pixelados)
  const tipStart = len - 11;
  ctx.fillStyle = '#cc4a0a';
  ctx.fillRect(tipStart,    -3, 4, 6);
  ctx.fillRect(tipStart+4,  -2, 3, 4);
  ctx.fillRect(tipStart+7,  -1, 2, 2);
  ctx.fillStyle = '#ff7a1a';
  ctx.fillRect(tipStart,    -2, 4, 4);
  ctx.fillRect(tipStart+4,  -1, 3, 2);

  // estrias amarelas (detalhe da cenoura)
  ctx.fillStyle = '#ffcc3d';
  for(let i=0;i<3;i++){
    ctx.fillRect(11 + i*8, -1, 3, 2);
  }
  // highlight branco
  ctx.fillStyle = '#fff7e0';
  ctx.fillRect(10, -3, 4, 1);

  ctx.restore();
}

function drawArenaBunny(){
  const x = arena.bx, y = arena.by;
  const flash = arena.hurtTimer>0 && (arena.hurtTimer%6<3);
  if(flash) ctx.globalAlpha = 0.4;
  // sombra
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(x-8, y+6, 16, 3);
  // corpo (visão top-down meio simplificada)
  ctx.fillStyle = '#fff7e0';
  ctx.fillRect(x-7, y-5, 14, 12);
  // orelhas
  ctx.fillRect(x-6, y-11, 4, 7);
  ctx.fillRect(x+2,  y-11, 4, 7);
  ctx.fillStyle = '#ff5fa2';
  ctx.fillRect(x-5, y-10, 2, 5);
  ctx.fillRect(x+3,  y-10, 2, 5);
  // olhos
  ctx.fillStyle = '#0d0a1a';
  ctx.fillRect(x-4, y-2, 2, 2);
  ctx.fillRect(x+2, y-2, 2, 2);
  ctx.globalAlpha = 1;

  // barra de HP pequena acima do bunny — sempre vermelha
  const bw = 20, bh = 3, by_ = y - 18;
  const pct = Math.max(0, Math.min(1, arena.hp / arena.maxHp));
  // fundo escuro
  ctx.fillStyle = '#000';
  ctx.fillRect(x - bw/2, by_, bw, bh);
  ctx.fillStyle = '#ff5252';
  ctx.fillRect(x - bw/2, by_, bw * pct, bh);
}

function drawArenaEnemy(e){
  const flash = e.hurtTimer>0;
  ctx.fillStyle = flash ? '#fff' : e.color;
  if(e.kind === 'slime'){
    ctx.fillRect(e.x-e.r, e.y-e.r+3, e.r*2, e.r*2-3);
    ctx.fillRect(e.x-e.r+2, e.y-e.r, e.r*2-4, 3);
    if(!flash){
      ctx.fillStyle = '#fff'; ctx.fillRect(e.x-4, e.y-2, 2, 2); ctx.fillRect(e.x+2, e.y-2, 2, 2);
      ctx.fillStyle = '#000'; ctx.fillRect(e.x-3, e.y-1, 1, 1); ctx.fillRect(e.x+3, e.y-1, 1, 1);
    }
  } else if(e.kind === 'bat'){
    // asas
    ctx.fillRect(e.x-e.r-2, e.y-2, 4, 5);
    ctx.fillRect(e.x+e.r-2, e.y-2, 4, 5);
    ctx.fillRect(e.x-5, e.y-3, 10, 6);
    if(!flash){
      ctx.fillStyle = '#ff5252'; ctx.fillRect(e.x-2, e.y-1, 1, 1); ctx.fillRect(e.x+1, e.y-1, 1, 1);
    }
  } else if(e.kind === 'skeleton'){
    ctx.fillRect(e.x-5, e.y-7, 10, 8);
    ctx.fillRect(e.x-3, e.y+1, 6, 6);
    if(!flash){
      ctx.fillStyle = '#000'; ctx.fillRect(e.x-3, e.y-4, 2, 2); ctx.fillRect(e.x+1, e.y-4, 2, 2);
    }
  } else if(e.kind === 'knight'){
    ctx.fillRect(e.x-e.r, e.y-e.r, e.r*2, e.r*2);
    if(!flash){
      ctx.fillStyle = '#5a4499'; ctx.fillRect(e.x-7, e.y-6, 14, 4); // capacete
      ctx.fillStyle = '#ffcc3d'; ctx.fillRect(e.x-2, e.y-4, 4, 2);
    }
  } else if(e.kind === 'boss'){
    ctx.fillRect(e.x-e.r, e.y-e.r, e.r*2, e.r*2);
    if(!flash){
      ctx.fillStyle = '#fff'; ctx.fillRect(e.x-7, e.y-4, 3, 4); ctx.fillRect(e.x+4, e.y-4, 3, 4);
      ctx.fillStyle = '#000'; ctx.fillRect(e.x-6, e.y-3, 2, 2); ctx.fillRect(e.x+5, e.y-3, 2, 2);
      ctx.fillStyle = '#ffcc3d'; ctx.fillRect(e.x-8, e.y-e.r-4, 16, 4); // coroa
    }
  }
  // hp bar
  if(e.hp < e.maxHp){
    ctx.fillStyle = '#000';
    ctx.fillRect(e.x-e.r, e.y-e.r-5, e.r*2, 3);
    ctx.fillStyle = '#4cf08e';
    ctx.fillRect(e.x-e.r, e.y-e.r-5, e.r*2*(e.hp/e.maxHp), 3);
  }
}

function drawArenaGem(g){
  if(g.isLettuce){
    // alface — fuel da forja (era a antiga "cenoura"), totalmente verde
    const t = performance.now()/200;
    const bob = Math.sin(t + g.age*0.05)*1.5;
    // folhas grandes (verde claro outside, verde escuro center)
    ctx.fillStyle = '#2aa860';
    ctx.fillRect(g.x-4, g.y-3+bob, 8, 6);
    ctx.fillStyle = '#4cf08e';
    ctx.fillRect(g.x-3, g.y-2+bob, 6, 4);
    // brilho central
    ctx.fillStyle = '#88f0a8';
    ctx.fillRect(g.x-1, g.y-1+bob, 2, 2);
    // mini folhas no topo
    ctx.fillStyle = '#2aa860';
    ctx.fillRect(g.x-2, g.y-5+bob, 4, 2);
    return;
  }
  if(g.isCarrot){
    // cenoura — currency pra upgrade de item (era a antiga "essence")
    const t = performance.now()/200;
    const bob = Math.sin(t + g.age*0.05)*1.5;
    // corpo da cenoura (laranja)
    ctx.fillStyle = '#ff7a1a';
    ctx.fillRect(g.x-3, g.y-3+bob, 6, 7);
    ctx.fillStyle = '#ff9b3a';
    ctx.fillRect(g.x-2, g.y-2+bob, 4, 5);
    // folhas verdes
    ctx.fillStyle = '#4cf08e';
    ctx.fillRect(g.x-2, g.y-6+bob, 4, 2);
    ctx.fillRect(g.x-1, g.y-7+bob, 2, 1);
    return;
  }
  if(g.isItem){
    const t = performance.now()/250;
    const bob = Math.sin(t + g.age*0.05)*2;
    const col = RARITY[g.item.rarity].color;
    // glow
    ctx.fillStyle = col + '50'; // hex+alpha
    ctx.fillRect(g.x-10, g.y-10+bob, 20, 20);
    ctx.fillStyle = col;
    ctx.fillRect(g.x-5, g.y-5+bob, 10, 10);
    ctx.fillStyle = '#fff';
    ctx.fillRect(g.x-3, g.y-3+bob, 2, 2);
  } else {
    const t = performance.now()/200;
    const pulse = 1 + Math.sin(t+g.age*0.1)*0.2;
    ctx.fillStyle = '#4cf08e';
    ctx.fillRect(g.x-3*pulse, g.y-3*pulse, 6*pulse, 6*pulse);
    ctx.fillStyle = '#aaffcc';
    ctx.fillRect(g.x-1, g.y-1, 2, 2);
  }
}

function _pillPath(x, y, w, h, r){
  // helper pra desenhar pill rounded (compatível com browsers sem roundRect)
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawPillBg(x, y, w, h, fillColor, borderColor, radius){
  const r = radius ?? Math.min(h/2, 14);
  // sombra suave
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  _pillPath(x+1, y+2, w, h, r);
  ctx.fill();
  // fundo
  ctx.fillStyle = fillColor;
  _pillPath(x, y, w, h, r);
  ctx.fill();
  // borda
  if(borderColor){
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 1.5;
    _pillPath(x, y, w, h, r);
    ctx.stroke();
  }
}

function drawArenaHUD(){
  // ===== HUD flutuante (pills) sobreposto ao grid =====
  // Player column UNIFICADA na esquerda: HP, LV+XP, Power, Kills e Essences
  // empilhados com a MESMA largura. STAGE pill na direita.
  // O frame já tem padding pra safe-area-inset-top (notch); aqui adicionamos
  // ainda um buffer lógico extra pra deixar a área superior visualmente "vazia"
  // garantindo respiro em celulares com câmera/notch central.
  ctx.textBaseline = 'middle';

  // === LAYOUT CONSTANTS ===
  const HUD_TOP_PAD = 20;        // buffer adicional pra notch/camera
  // LV/XP pill alinhada (mesma altura e largura) com STAGE/Essences no topo
  const colX = 8;
  const colW = 80;
  const pillH = 31;
  const pillGap = 4;

  // HP bar foi movida pra cima do bunny no grid (ver drawArenaBunny).
  // === LV + XP pill (alinhada com STAGE/Essences no topo) ===
  let cy = HUD_TOP_PAD;
  drawPillBg(colX, cy, colW, pillH, 'rgba(13,10,26,0.7)', '#2a6f95', 10);
  // badge circular com nível à esquerda
  ctx.fillStyle = '#88daf0';
  ctx.beginPath();
  ctx.arc(colX+13, cy+pillH/2, 10, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#0d2a3a';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${arena.level}`, colX+13, cy+pillH/2+1);
  // XP bar interno (centralizado verticalmente no pill maior)
  const xpBarX = colX+26, xpBarH = 14, xpBarY = cy + (pillH-xpBarH)/2, xpBarW = colW - 32;
  drawPillBg(xpBarX, xpBarY, xpBarW, xpBarH, '#1a4a7a', null, 7);
  ctx.fillStyle = '#88daf0';
  const xpPct = Math.max(0, Math.min(1, arena.xp/arena.xpToNext));
  if(xpPct > 0){
    _pillPath(xpBarX, xpBarY, Math.max(3, xpBarW*xpPct), xpBarH, 7);
    ctx.fill();
  }
  ctx.fillStyle = '#fff7e0';
  ctx.font = 'bold 9px monospace';
  ctx.fillText(`${Math.floor(arena.xp)}/${arena.xpToNext}`, xpBarX + xpBarW/2, xpBarY+xpBarH/2+1);

  // === Power pill (⚔️) — abaixo do LV/XP, mantém largura ===
  cy += pillH + pillGap;
  const pwH = 22;
  drawPillBg(colX, cy, colW, pwH, 'rgba(255,180,40,0.95)', '#ffcc3d', 10);
  const pulse = arena.powerPulseTimer > 0
    ? 1 + Math.sin(arena.powerPulseTimer*0.45)*0.10 : 1;
  ctx.fillStyle = '#3a230b';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('⚔️', colX+4, cy+pwH/2+1);
  ctx.font = `bold ${Math.round(11*pulse)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(`${arena.power}`, colX+colW/2+6, cy+pwH/2+1);
  const pwY = cy;

  // === Kills pill (💀) — centralizada no BOTTOM do play grid (estilo Forge Master) ===
  const killsW = 70, killsH = 22;
  const killsX = (W - killsW) / 2;
  const killsY = ARENA.BOT_Y - killsH - 4;
  drawPillBg(killsX, killsY, killsW, killsH, 'rgba(122,95,196,0.95)', '#a86bff', 11);
  ctx.fillStyle = '#0d0a1a';
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('💀', killsX+6, killsY+killsH/2+1);
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${arena.killCount}`, killsX+killsW/2+6, killsY+killsH/2+1);

  // === Cenouras pill (🥕) — canto superior DIREITO, recurso pra upgrade de item ===
  const essW = 80, essH = 31;
  const essX = W - essW - 8, essY = HUD_TOP_PAD;
  drawPillBg(essX, essY, essW, essH, 'rgba(255,154,58,0.95)', '#ffcc3d', 10);
  ctx.fillStyle = '#3a230b';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('🥕', essX+6, essY+essH/2+1);
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${arena.carrots || 0}`, essX+essW/2+8, essY+essH/2+1);

  // === STAGE pill (centralizado no topo, +20% tamanho vs versão anterior) ===
  const stageW = 115, stageH = 31;
  const stageX = (W - stageW) / 2, stageY = HUD_TOP_PAD;
  drawPillBg(stageX, stageY, stageW, stageH, 'rgba(13,10,26,0.78)', '#7a5fc4', 10);
  ctx.fillStyle = '#fff7e0';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`STAGE ${stageLabel(arena.stage)}`, stageX + stageW/2, stageY+stageH/2+1);
  // wave dots embaixo do STAGE (+20% raio e espaçamento)
  const dotR = 3.6;
  const dotSp = 9.6;
  const dotsTotalW = (WAVES_PER_STAGE-1) * dotSp;
  const dotsX0 = stageX + stageW/2 - dotsTotalW/2;
  for(let i=0;i<WAVES_PER_STAGE;i++){
    const isCur = (i+1) === arena.wave;
    const isPast = (i+1) < arena.wave;
    const isBoss = (i+1) === WAVES_PER_STAGE;
    ctx.fillStyle = isCur ? (isBoss?'#ff5252':'#ffcc3d')
                  : isPast ? '#4cf08e'
                  : (isBoss?'#5a2a2a':'#3b2a70');
    ctx.beginPath();
    ctx.arc(dotsX0 + i*dotSp, stageY+stageH+8, dotR, 0, Math.PI*2);
    ctx.fill();
  }

  // delta de power flutuante — emerge do power pill
  if(arena.powerDeltaTimer > 0){
    const lifeT = arena.powerDeltaTimer / 90;
    const yOff = (1-lifeT) * 24;
    const alpha = Math.min(1, lifeT * 2.5);
    ctx.globalAlpha = alpha;
    const sign = arena.powerDelta >= 0 ? '+' : '';
    const txt = `${sign}${arena.powerDelta}`;
    const col = arena.powerDelta >= 0 ? '#4cf08e' : '#ff5252';
    ctx.fillStyle = '#000';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(txt, colX+colW/2+6+1, pwY+11-yOff+1);
    ctx.fillStyle = col;
    ctx.fillText(txt, colX+colW/2+6, pwY+11-yOff);
    ctx.globalAlpha = 1;
  }

  // reset
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';


  // 6 slots de itens no bottom HUD
  ctx.fillStyle = 'rgba(13,10,26,0.92)';
  ctx.fillRect(0, ARENA.BOT_Y+4, W, H-ARENA.BOT_Y-4);
  ctx.fillStyle = '#5a4499';
  ctx.fillRect(0, ARENA.BOT_Y+4, W, 2);

  // 8 slots edge-to-edge, retangulares verticais (ícone em cima + stat embaixo)
  const slotW = 42, slotH = 68, gap = 2;
  const totalW = ARENA_SLOTS.length*slotW + (ARENA_SLOTS.length-1)*gap;
  let sx = (W-totalW)/2;
  const sy = ARENA.BOT_Y + 12;
  for(const slot of ARENA_SLOTS){
    const it = arena.items[slot];
    const col = it ? RARITY[it.rarity].color : '#241a44';
    // slots vazios ficam apagados (visualmente menos chamativos)
    if(!it) ctx.globalAlpha = 0.4;
    // borda colorida pela raridade (mais clara)
    ctx.fillStyle = col;
    ctx.fillRect(sx, sy, slotW, slotH);
    // miolo: cor da era se equipado (mesma cor da borda mas com um tom escurecido
    // por baixo de uma camada semi-transparente pra dar profundidade); escuro se vazio
    if(it){
      // background colorido na cor do tier
      ctx.fillStyle = col;
      ctx.fillRect(sx+2, sy+2, slotW-4, slotH-4);
      // overlay escuro semi-transparente pro icone "respirar" e level ficar legivel
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(sx+2, sy+2, slotW-4, slotH-4);
    } else {
      ctx.fillStyle = '#0d0a1a';
      ctx.fillRect(sx+2, sy+2, slotW-4, slotH-4);
    }
    // divisória sutil entre ícone e stat
    ctx.fillStyle = col;
    ctx.fillRect(sx+4, sy+slotH-18, slotW-8, 1);
    // ícone grande no topo
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if(it){
      // slot equipado: mantém ícone colorido (emoji nativo) com tint da era
      ctx.fillStyle = col;
      ctx.font = 'bold 26px monospace';
      ctx.fillText(it.icon, sx+slotW/2, sy + 26);
      // só level embaixo (sem stat numérico — o detalhe vai pra popup)
      ctx.fillStyle = '#88daf0';
      ctx.font = 'bold 10px monospace';
      ctx.fillText(`Lv ${it.currentLevel || it.level || 1}`, sx+slotW/2, sy+slotH-9);
    } else {
      // slot vazio: ícone em cor única chapada (filter monocromático)
      ctx.save();
      ctx.filter = 'grayscale(1) brightness(0.45)';
      ctx.font = '26px monospace';
      ctx.fillText(ARENA_SLOT_ICONS[slot], sx+slotW/2, sy + 26);
      ctx.restore();
      // label do slot embaixo (vazio)
      ctx.fillStyle = '#5a4499';
      ctx.font = 'bold 8px monospace';
      const lbl = (ARENA_SLOT_LABELS[slot] || slot).toUpperCase();
      ctx.fillText(lbl, sx+slotW/2, sy+slotH-9);
    }
    ctx.globalAlpha = 1;
    sx += slotW + gap;
  }
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';

  // banner de MORTE (respawn)
  if(arena.deathBannerTimer > 0){
    const lifeT = arena.deathBannerTimer / 90;
    const alpha = Math.min(1, lifeT*2);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(60,0,0,0.55)';
    ctx.fillRect(0, ARENA.TOP_Y + 80, W, 70);
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#000';
    ctx.fillText('DERROTADO', W/2+2, ARENA.TOP_Y+114+2);
    ctx.fillStyle = '#ff5252';
    ctx.fillText('DERROTADO', W/2, ARENA.TOP_Y+114);
    ctx.font = 'bold 12px monospace';
    ctx.fillStyle = '#fff7e0';
    ctx.fillText(`Stage ${stageLabel(arena.stage)} — Wave 1`, W/2, ARENA.TOP_Y+136);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }

  // banner de STAGE CLEAR
  if(arena.stageClearBannerTimer > 0){
    const lifeT = arena.stageClearBannerTimer / 120;
    const alpha = Math.min(1, lifeT*2);
    const scale = 1 + (1-lifeT)*0.15;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, ARENA.TOP_Y + 100, W, 80);
    ctx.font = `bold ${Math.round(28*scale)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#000';
    ctx.fillText('STAGE CLEAR!', W/2+2, ARENA.TOP_Y+138+2);
    ctx.fillStyle = '#ffcc3d';
    ctx.fillText('STAGE CLEAR!', W/2, ARENA.TOP_Y+138);
    ctx.font = 'bold 14px monospace';
    ctx.fillStyle = '#fff7e0';
    ctx.fillText(`Próximo: ${stageLabel(arena.stage+1)}`, W/2, ARENA.TOP_Y+162);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
}

function renderArena(){
  setupCtx();
  ctx.clearRect(0,0,W,H);

  // bg gradient
  const grad = ctx.createRadialGradient(W/2, (ARENA.TOP_Y+ARENA.BOT_Y)/2, 30, W/2, (ARENA.TOP_Y+ARENA.BOT_Y)/2, 400);
  grad.addColorStop(0, '#3a2065');
  grad.addColorStop(1, '#0d0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // arena floor pattern
  const tile = 36;
  for(let yy=ARENA.TOP_Y; yy<ARENA.BOT_Y; yy+=tile){
    for(let xx=ARENA.LEFT_X; xx<ARENA.RIGHT_X; xx+=tile){
      const oddCheck = ((xx/tile)|0) + ((yy/tile)|0);
      ctx.fillStyle = oddCheck%2 === 0 ? 'rgba(122,95,196,0.08)' : 'rgba(0,0,0,0.12)';
      ctx.fillRect(xx, yy, tile, tile);
    }
  }
  // arena border — só linha inferior (separa do items strip); top/lados ficam abertos
  ctx.fillStyle = '#5a4499';
  ctx.fillRect(ARENA.LEFT_X, ARENA.BOT_Y-2, ARENA.RIGHT_X-ARENA.LEFT_X, 2);

  // gems
  for(const g of arena.gems) drawArenaGem(g);

  // enemies
  for(const e of arena.enemies) drawArenaEnemy(e);

  // swings (espada de cenoura)
  for(const sw of arena.swings){
    const t = sw.frame / sw.lifeFrames;
    const swingAngle = sw.centerAngle + sw.dir * (sw.arc/2 - sw.arc * t);
    drawCarrotSword(arena.bx, arena.by, swingAngle, sw.range, t);
  }

  // efeitos especiais (habilidades de dados)
  for(const ef of arena.effects){
    if(ef.kind === 'shockwave'){
      const a = 1 - ef.frame/ef.lifeFrames;
      ctx.fillStyle = `rgba(95,176,216,${0.8*a})`;
      const r = ef.r, rw = 5;
      ctx.fillRect(ef.x-r, ef.y-1, r*2, 2);
      ctx.fillRect(ef.x-1, ef.y-r, 2, r*2);
      // anel pixelado em 8 direções
      for(let k=0;k<16;k++){
        const ang = (k/16)*Math.PI*2;
        const rx = ef.x + Math.cos(ang)*r;
        const ry = ef.y + Math.sin(ang)*r;
        ctx.fillRect(rx-2, ry-2, 4, 4);
      }
    }
    else if(ef.kind === 'beam'){
      const a = 1 - ef.frame/ef.lifeFrames*0.5;
      ctx.save();
      ctx.translate(ef.x, ef.y);
      ctx.rotate(ef.angle);
      ctx.fillStyle = `rgba(168,107,255,${0.7*a})`;
      ctx.fillRect(-12, -6, 24, 12);
      ctx.fillStyle = `rgba(255,247,224,${a})`;
      ctx.fillRect(-10, -2, 20, 4);
      ctx.restore();
    }
    else if(ef.kind === 'rangedProj'){
      // flecha-cenoura pixel-art apontando na direção do tiro
      ctx.save();
      ctx.translate(ef.x, ef.y);
      ctx.rotate(ef.angle);
      // haste laranja
      ctx.fillStyle = '#cc4a0a';
      ctx.fillRect(-8, -2, 14, 4);
      ctx.fillStyle = '#ff7a1a';
      ctx.fillRect(-8, -1, 14, 2);
      // ponta
      ctx.fillStyle = '#ffcc3d';
      ctx.fillRect(6, -3, 4, 6);
      ctx.fillRect(10, -2, 2, 4);
      ctx.fillStyle = '#fff7e0';
      ctx.fillRect(8, -2, 2, 2);
      // empenagem verde
      ctx.fillStyle = '#2aa860';
      ctx.fillRect(-10, -4, 4, 8);
      ctx.fillStyle = '#4cf08e';
      ctx.fillRect(-9, -3, 2, 6);
      ctx.restore();
    }
    else if(ef.kind === 'orbiter'){
      const a = ef.frame > ef.lifeFrames-30 ? (ef.lifeFrames-ef.frame)/30 : 1;
      ctx.fillStyle = `rgba(95,176,216,${0.7*a})`;
      ctx.fillRect(ef.x-6, ef.y-6, 12, 12);
      ctx.fillStyle = `rgba(255,247,224,${a})`;
      ctx.fillRect(ef.x-3, ef.y-3, 6, 6);
      ctx.fillStyle = `rgba(255,204,61,${a})`;
      ctx.fillRect(ef.x-1, ef.y-1, 2, 2);
    }
    else if(ef.kind === 'meteor'){
      if(!ef.exploded){
        // streak descendente
        ctx.fillStyle = '#ff5252';
        ctx.fillRect(ef.x-6, ef.y-12, 12, 24);
        ctx.fillStyle = '#ffcc3d';
        ctx.fillRect(ef.x-4, ef.y-10, 8, 20);
        ctx.fillStyle = '#fff7e0';
        ctx.fillRect(ef.x-2, ef.y-8, 4, 16);
        // sombra alvo
        ctx.fillStyle = 'rgba(255,82,82,0.25)';
        ctx.fillRect(ef.targetX-30, ef.targetY-30, 60, 60);
      } else {
        // explosão pulsante
        const t = (ef.frame - (ef.lifeFrames-8))/8;
        const r = ef.radius * (1 + t*0.5);
        ctx.fillStyle = `rgba(255,140,40,${0.8*(1-t)})`;
        ctx.fillRect(ef.targetX-r, ef.targetY-r, r*2, r*2);
      }
    }
    else if(ef.kind === 'nuke'){
      const t = ef.frame/ef.lifeFrames;
      ctx.fillStyle = `rgba(255,247,224,${0.8*(1-t)})`;
      ctx.fillRect(0,0,W,H);
    }
  }

  // bunny
  drawArenaBunny();

  // particles
  for(const pt of arena.particles){
    ctx.globalAlpha = Math.min(1, pt.life/18);
    ctx.fillStyle = pt.color;
    ctx.fillRect(pt.x, pt.y, 2, 2);
  }
  ctx.globalAlpha = 1;

  drawArenaHUD();
}

// ============== FORGE ==============
// 35 níveis de forja (design.md §5.1, §10). Kills por nível com crescimento ~exponencial.
function buildForgeThresholds(){
  const arr = [0];
  // crescimento moderado: cada nível precisa ~30% mais kills que o anterior, base 10
  let acc = 10;
  for(let i=1; i<=34; i++){
    arr.push(Math.round(acc));
    acc = acc * 1.32 + 4;
  }
  return arr; // length = 35 (indices 0..34, onde index i = kills pra alcançar nível i+1)
}
const FORGE_THRESHOLDS = buildForgeThresholds();
const FORGE_MAX_LEVEL = FORGE_THRESHOLDS.length; // 35
function forgeIntervalAtLevel(lvl){
  // L1=15s, decresce até mínimo 3s no level 25+
  return Math.max(180, Math.round(900 - (lvl-1) * 30));
}
function canUpgradeForge(){
  return arena.forgeLevel < FORGE_MAX_LEVEL
      && arena.killCount >= FORGE_THRESHOLDS[arena.forgeLevel]; // próximo threshold
}

// Ícones por era pra exibição no popup
const ERA_ICONS = {
  primitive:'🪨', medieval:'⚔️', earlymodern:'🎩', modern:'🚂',
  space:'🚀', interstellar:'🛸', multiverse:'🌌', quantum:'⚛️',
  underworld:'🔥', divine:'👑',
};
// Compat: alguns trechos antigos chamam TIER_ICONS[item.rarity]
const TIER_ICONS = ERA_ICONS;

function rarityProbsForLevel(lvl){
  // Versão moderna: distribui as 10 eras pela gaussiana do level (design §5.2)
  const arr = getEraProbabilities(lvl);
  const probs = {};
  for(let i=0; i<ERAS.length; i++){
    probs[ERAS[i].key] = arr[i] * 100;
  }
  return probs;
}

function fmtPct(p){
  if(p === 0) return '0%';
  if(p < 1) return p.toFixed(1) + '%';
  if(p < 10) return p.toFixed(1) + '%';
  return Math.round(p) + '%';
}

function buildForgeLevelInfo(){
  const lvl = arena.forgeLevel;
  const atMax = lvl >= FORGE_MAX_LEVEL;
  const curProbs = rarityProbsForLevel(lvl);
  const nextProbs = atMax ? curProbs : rarityProbsForLevel(lvl+1);

  // header com Nível atual ▶ Próximo
  let header = `<div class="forge-level-cols">
    <span class="spacer"></span>
    <span class="col-cur">Nível ${lvl}</span>
    <span class="col-next">${atMax ? 'MAX' : '▶ Nível '+(lvl+1)}</span>
  </div>`;

  // uma linha por raridade
  let rows = '';
  for(const k of RARITY_KEYS){
    const r = RARITY[k];
    const cur = curProbs[k];
    const next = nextProbs[k];
    const locked = (cur === 0 && next === 0);
    // background gradiente da cor da raridade pra escuro
    const bg = `linear-gradient(90deg, ${r.color}cc 0%, ${r.color}55 60%, ${r.color}22 100%)`;
    rows += `
      <div class="forge-prob-row${locked ? ' locked' : ''}" style="background:${bg};">
        <span class="ico">${TIER_ICONS[k]}</span>
        <span class="name">${r.name}</span>
        <span class="pct cur">${fmtPct(cur)}</span>
        <span class="pct next">${fmtPct(next)}</span>
      </div>`;
  }

  // status do upgrade (kills necessárias)
  let footer = '';
  if(!atMax){
    const reqKills = FORGE_THRESHOLDS[lvl];
    const enough = arena.killCount >= reqKills;
    footer = `<p style="text-align:center;margin-top:10px;font-size:11px;color:#9b8fc4">
      Kills: <b style="color:${enough?'#4cf08e':'#ff5252'}">${arena.killCount} / ${reqKills}</b>
    </p>`;
  }

  return header + `<div class="forge-prob-list">${rows}</div>` + footer;
}

function openForgeLevel(){
  document.getElementById('forgeLevelInfo').innerHTML = buildForgeLevelInfo();
  const upBtn = document.getElementById('forgeLevelUpgradeBtn');
  if(canUpgradeForge()){
    upBtn.disabled = false;
    upBtn.style.opacity = '1';
    upBtn.textContent = '⚡ Melhorar';
  } else if(arena.forgeLevel >= FORGE_MAX_LEVEL){
    upBtn.disabled = true;
    upBtn.style.opacity = '0.5';
    upBtn.textContent = 'MAX';
  } else {
    upBtn.disabled = true;
    upBtn.style.opacity = '0.5';
    upBtn.textContent = '⚡ Melhorar';
  }
  state = STATE.ARENA_TAB;
  showLayer('forgeLevelLayer');
}

function upgradeForgeLevel(){
  if(!canUpgradeForge()) return;
  arena.forgeLevel++;
  arena.forgeInterval = forgeIntervalAtLevel(arena.forgeLevel);
  spawnArenaParticle(arena.bx, arena.by, '#5fb0d8', 24);
  // re-render popup
  openForgeLevel();
}

function autoForgeStep(){
  if(arena.lettuce < FORGE_COST) return; // não auto-forja sem cenoura
  arena.lettuce -= FORGE_COST;
  const newItem = rollItem();
  const equipped = arenaEquipItem(newItem);
  if(equipped){
    spawnArenaParticle(arena.bx, arena.by, RARITY[newItem.rarity].color, 12);
  } else {
    spawnArenaParticle(arena.bx, arena.by, '#5a4499', 4);
  }
}

document.getElementById('arenaForgeLevelBtn').addEventListener('click', ()=>{
  if(state !== STATE.ARENA_PLAY && state !== STATE.ARENA_TAB) return;
  openForgeLevel();
});
document.getElementById('forgeLevelCloseBtn').addEventListener('click', ()=>{
  hideAllLayers();
  state = STATE.ARENA_PLAY;
});
document.getElementById('forgeLevelUpgradeBtn').addEventListener('click', upgradeForgeLevel);
document.getElementById('arenaForgeAutoBtn').addEventListener('click', ()=>{
  arena.autoForge = !arena.autoForge;
  document.getElementById('arenaForgeAutoBtn').classList.toggle('active', arena.autoForge);
});

function eraOfItem(item){
  // pega era pelo campo novo, ou shim via rarity (compat com itens iniciais)
  if(item && item.eraKey && ERA_BY_KEY[item.eraKey]) return ERA_BY_KEY[item.eraKey];
  if(item && item.rarity && ERA_BY_KEY[item.rarity]) return ERA_BY_KEY[item.rarity];
  return ERAS[0];
}

function forgeItemCardInner(item){
  const era = eraOfItem(item);
  const lvl = item.level ? `<div class="rare" style="color:${era.color}">Lv ${item.level}</div>` : '';
  return `
    <div class="ico" style="color:${era.color}">${item.icon}</div>
    <div class="nm" style="color:${era.color}">${item.name}</div>
    <div class="rare" style="color:${era.color}">${era.name}</div>
    ${lvl}
    <div class="stat">+${(+item.value).toFixed(2)} ${item.stat}</div>
  `;
}

function tierClassForPct(p){
  if(p >= 80) return 'tier-high';
  if(p >= 50) return 'tier-mid';
  if(p >= 25) return 'tier-low';
  return 'tier-poor';
}

function buildSubstatsHtml(newItem, oldItem){
  let html = '';
  // badge tier-up sempre que houve subida de era
  if(newItem.tiersUp > 0){
    const cls = newItem.tiersUp > 1 ? 'tierup-badge double' : 'tierup-badge';
    const fromEra = ERAS[newItem.originalEraIdx] ? ERAS[newItem.originalEraIdx].name : '';
    const label = newItem.tiersUp > 1
      ? `★★ DOUBLE TIER UP · subiu de ${fromEra}`
      : `★ TIER UP · subiu de ${fromEra}`;
    html += `<div style="text-align:center;margin-bottom:6px"><span class="${cls}">${label}</span></div>`;
  }
  if(!newItem.substats || !newItem.substats.length){
    html += `<div class="substat-row" style="opacity:.7"><span class="nm">Sem substats (era ${eraOfItem(newItem).name})</span></div>`;
    return html;
  }
  // valores escalados pelo currentLevel via getDisplayedSubstats (design-level-scaling §4)
  const displayed = getDisplayedSubstats(newItem);
  // mapa pra delta vs item antigo (se houver)
  const oldDisplayed = oldItem ? getDisplayedSubstats(oldItem) : [];
  const oldMap = Object.fromEntries(oldDisplayed.map(s => [s.id, s.value]));
  for(const s of displayed){
    const cls = tierClassForPct(s.percentOfMax);
    const oldV = oldMap[s.id];
    let delta = '';
    if(oldV !== undefined){
      const d = s.value - oldV;
      if(Math.abs(d) > 0.001){
        delta = d > 0 ? ` <span style="color:#4cf08e">+${d.toFixed(1)}</span>` : ` <span style="color:#ff5252">${d.toFixed(1)}</span>`;
      }
    }
    html += `
      <div class="substat-row ${cls}">
        <span class="nm">${s.name}</span>
        <span class="val">+${s.value}${s.unit}${delta}</span>
        <span class="bar"><span style="width:${s.percentOfMax}%" title="Roll quality ${s.percentOfMax}%"></span></span>
      </div>`;
  }
  return html;
}

// =================== DICE FORGE FLOW ===================
// rollState: estado da sessão atual de forja por dados
const forgeRoll = {
  active: false,
  phase: 'idle',          // 'idle' | 'rolling' | 'after-roll' | 'confirmed'
  dice: [1,1,1,1,1],
  held: [false,false,false,false,false],
  rerollsLeft: 0,
  currentCombo: null,
};

function _forgeDice(){ return document.querySelectorAll('#arenaDiceRow .forge-die'); }
function _forgeDie(i){ return document.querySelector(`#arenaDiceRow .forge-die[data-i="${i}"]`); }

function diceFace(v){
  // ⚀⚁⚂⚃⚄⚅ pra valores 1-6
  return ['·','⚀','⚁','⚂','⚃','⚄','⚅'][v] || '·';
}

function renderForgeDice(){
  // pré-computa combo + indices participantes pra aplicar glow nos dados certos
  let activeCombo = null;
  let highlightSet = null;
  if(forgeRoll.phase === 'after-roll'){
    const comboKey = evalComboArr(forgeRoll.dice.map(v=>({value:v})));
    activeCombo = COMBO_DATA[comboKey] || COMBO_DATA.NONE;
    forgeRoll.currentCombo = activeCombo;
    const glowColor = COMBO_GLOW_COLOR[activeCombo.id];
    if(glowColor){
      const idxs = getComboDiceIndices(forgeRoll.dice, activeCombo.id);
      highlightSet = { set: new Set(idxs), color: glowColor };
    }
  }
  for(let i=0; i<5; i++){
    const el = _forgeDie(i);
    if(!el) continue;
    el.querySelector('.face').textContent = diceFace(forgeRoll.dice[i]);
    el.classList.toggle('held', !!forgeRoll.held[i]);
    // dados só são interativos depois da rolagem (pra travar/destravar)
    el.classList.toggle('disabled', forgeRoll.phase !== 'after-roll');
    // combo glow
    if(highlightSet && highlightSet.set.has(i)){
      el.classList.add('combo-glow');
      el.style.setProperty('--combo-color', highlightSet.color);
    } else {
      el.classList.remove('combo-glow');
      el.style.removeProperty('--combo-color');
    }
  }
  // combo + cenoura inline
  const comboEl = document.getElementById('forgeComboInline');
  const carrotsEl = document.getElementById('arenaCarrotsCount');
  if(carrotsEl) carrotsEl.textContent = `🥬 ${arena.lettuce}`;
  if(comboEl){
    if(forgeRoll.phase === 'idle'){
      // idle: sem texto de "Pronto" — o botão ROLL FORGE já comunica isso
      comboEl.textContent = '';
    } else if(forgeRoll.phase === 'rolling'){
      comboEl.textContent = '…rolando';
      comboEl.style.color = '#9b8fc4';
    } else if(activeCombo){
      // cor: usa a cor do glow (degrade amarelo→vermelho) quando há combo real,
      // caso contrário a cor base do combo (cinza pro MAXROLL)
      const col = COMBO_GLOW_COLOR[activeCombo.id] || activeCombo.color;
      comboEl.innerHTML = `<span style="color:${col}">${activeCombo.name} ×${activeCombo.mult.toFixed(1)}</span>`;
    }
  }
  // botões
  const rollBtn    = document.getElementById('arenaForgeRollBtn');
  const confirmBtn = document.getElementById('arenaForgeConfirmBtn');
  if(!rollBtn || !confirmBtn) return;
  if(forgeRoll.phase === 'idle'){
    rollBtn.style.display = '';
    rollBtn.disabled = arena.lettuce < FORGE_BASE_COST;
    rollBtn.textContent = `ROLL FORGE (${FORGE_BASE_COST}🥬)`;
    confirmBtn.style.display = 'none';
  } else if(forgeRoll.phase === 'rolling'){
    rollBtn.style.display = '';
    rollBtn.disabled = true;
    rollBtn.textContent = '…rolando';
    confirmBtn.style.display = 'none';
  } else if(forgeRoll.phase === 'after-roll'){
    // Botão de reroll só aparece se há rerolls disponíveis (design §14)
    const canReroll = forgeRoll.rerollsLeft > 0 && arena.lettuce >= FORGE_REROLL_COST;
    if(canReroll){
      rollBtn.style.display = '';
      rollBtn.disabled = false;
      rollBtn.textContent = `🔁 REROLAR · ${forgeRoll.rerollsLeft} restantes`;
    } else {
      rollBtn.style.display = 'none';
    }
    confirmBtn.style.display = '';
    confirmBtn.disabled = false;
    confirmBtn.textContent = '⚡ FORJAR';
  }
}

function openForgeDice(){
  // inline: sempre visível durante ARENA_PLAY, mas reseta estado pra idle
  forgeRoll.active = true;
  forgeRoll.phase = 'idle';
  forgeRoll.dice = [1,1,1,1,1];
  forgeRoll.held = [false,false,false,false,false];
  forgeRoll.rerollsLeft = FORGE_MAX_REROLLS;
  forgeRoll.currentCombo = null;
  renderForgeDice();
}

function animateForgeRoll(onDone){
  forgeRoll.phase = 'rolling';
  for(const el of _forgeDice()) el.classList.add('rolling');
  let frame = 0;
  const totalFrames = 8;
  const tick = setInterval(()=>{
    for(let i=0; i<5; i++){
      if(!forgeRoll.held[i]){
        forgeRoll.dice[i] = 1 + ((Math.random()*6)|0);
      }
    }
    renderForgeDice();
    // garante classe rolling fica nos dados girando
    for(let i=0;i<5;i++){
      const el = _forgeDie(i);
      if(el){
        if(forgeRoll.held[i]) el.classList.remove('rolling');
        else el.classList.add('rolling');
      }
    }
    frame++;
    if(frame >= totalFrames){
      clearInterval(tick);
      for(const el of _forgeDice()) el.classList.remove('rolling');
      forgeRoll.phase = 'after-roll';
      renderForgeDice();
      if(onDone) onDone();
    }
  }, 70);
}

// Botão principal contextual: idle = cobra base + rola; after-roll = reroll
function forgeMainAction(){
  if(state !== STATE.ARENA_PLAY) return;
  if(forgeRoll.phase === 'idle'){
    if(arena.lettuce < FORGE_BASE_COST) return;
    arena.lettuce -= FORGE_BASE_COST;
    forgeRoll.held = [false,false,false,false,false];
    forgeRoll.rerollsLeft = FORGE_MAX_REROLLS;
    animateForgeRoll();
  } else if(forgeRoll.phase === 'after-roll'){
    if(forgeRoll.rerollsLeft <= 0) return;
    if(arena.lettuce < FORGE_REROLL_COST) return;
    arena.lettuce -= FORGE_REROLL_COST;
    forgeRoll.rerollsLeft--;
    animateForgeRoll();
  }
}

function forgeToggleHold(i){
  if(forgeRoll.phase !== 'after-roll') return;
  forgeRoll.held[i] = !forgeRoll.held[i];
  renderForgeDice();
}

function forgeConfirm(){
  if(state !== STATE.ARENA_PLAY) return;
  if(forgeRoll.phase !== 'after-roll') return;
  const combo = forgeRoll.currentCombo || COMBO_DATA.MAXROLL;
  arena.pendingForgeItem = generateForgedItem(arena.forgeLevel, combo);
  // depois de forjar, popup compare assume o controle (suspende o ARENA_PLAY)
  openForgeCompare();
}

// shim: chamada antiga `tryForge()` (auto-forge etc) só executa a ação principal
function tryForge(){
  forgeMainAction();
}

function openForgeCompare(){
  const newItem = arena.pendingForgeItem;
  if(!newItem) return;
  const oldItem = arena.items[newItem.slot];

  const oldCard = document.getElementById('forgeOldCard');
  const newCard = document.getElementById('forgeNewCard');

  const slotLabel = ARENA_SLOT_LABELS[newItem.slot] || newItem.slot;
  const oldInner = oldItem
    ? forgeItemCardInner(oldItem)
    : `<div class="ico" style="color:#5a4499">${ARENA_SLOT_ICONS[newItem.slot]}</div>
       <div class="nm" style="color:#5a4499">Vazio</div>
       <div class="rare" style="color:#5a4499">(${slotLabel})</div>
       <div class="stat" style="color:#5a4499">—</div>`;
  oldCard.innerHTML = `<div class="label">EQUIPADO</div>` + oldInner;
  oldCard.className = 'forge-card' + (oldItem ? '' : ' empty');

  let deltaHtml = '';
  if(oldItem && oldItem.stat === newItem.stat){
    const delta = newItem.value - oldItem.value;
    if(Math.abs(delta) < 0.005){
      deltaHtml = `<div class="forge-delta forge-equal">= mesmo</div>`;
    } else if(delta > 0){
      deltaHtml = `<div class="forge-delta forge-up">▲ +${delta.toFixed(2)}</div>`;
    } else {
      deltaHtml = `<div class="forge-delta forge-down">▼ ${delta.toFixed(2)}</div>`;
    }
  } else if(!oldItem){
    deltaHtml = `<div class="forge-delta forge-up">▲ NOVO SLOT</div>`;
  } else {
    deltaHtml = `<div class="forge-delta forge-equal">stat diferente</div>`;
  }

  newCard.innerHTML = `<div class="label">NOVO</div>` + forgeItemCardInner(newItem) + deltaHtml;
  newCard.className = 'forge-card';

  // substats list (e tier-up badge)
  const subsEl = document.getElementById('forgeSubstats');
  if(subsEl){
    subsEl.innerHTML = buildSubstatsHtml(newItem, oldItem);
  }

  state = STATE.ARENA_TAB;
  showLayer('forgeCompare');
}

function closeForge(){
  arena.pendingForgeItem = null;
  hideAllLayers();
  state = STATE.ARENA_PLAY;
  // reseta a strip de dados pra próxima forja
  forgeRoll.active = true;
  forgeRoll.phase = 'idle';
  forgeRoll.dice = [1,1,1,1,1];
  forgeRoll.held = [false,false,false,false,false];
  forgeRoll.rerollsLeft = FORGE_MAX_REROLLS;
  forgeRoll.currentCombo = null;
  renderForgeDice();
}

  if(!_currentPopupSlot) return;
  const it = arena.items[_currentPopupSlot];
  if(!it) return;

  }
  refreshItemValue(it);
  renderItemPopup();
});

// ============== ITEM DETAIL POPUP ==============
// Mostra detalhes do item ao clicar no slot do items strip (renderizado no canvas).
let _currentPopupSlot = null;

function fmtStatValue(stat, raw){
  const isFlat = (stat === 'dmg' || stat === 'maxHp' || stat === 'pickupRange' || stat === 'projectiles');
  if(isFlat){
    return raw < 10 ? `+${raw.toFixed(1)} ${stat}` : `+${Math.round(raw)} ${stat}`;
  }
  return `+${Math.round(raw*100)}% ${stat}`;
}

function showItemPopup(slotKey){
  _currentPopupSlot = slotKey;
  renderItemPopup();
  document.getElementById('itemPopup').classList.add('show');
  document.getElementById('itemPopupBackdrop').classList.add('show');
}

function renderItemPopup(){
  const slotKey = _currentPopupSlot;
  if(!slotKey) return;
  const popup    = document.getElementById('itemPopup');
  const iconEl   = document.getElementById('itemPopupIcon');
  const nameEl   = document.getElementById('itemPopupName');
  const metaEl   = document.getElementById('itemPopupMeta');
  const slotEl   = document.getElementById('itemPopupSlot');
  const primaryEl= document.getElementById('itemPopupPrimary');
  const subsEl   = document.getElementById('itemPopupSubs');
  const lvlRow   = document.getElementById('itemPopupLevelRow');
  const curLvlEl = document.getElementById('itemPopupCurLvl');
  const maxLvlEl = document.getElementById('itemPopupMaxLvl');
  const lvlFill  = document.getElementById('itemPopupLevelFill');
  const upRow    = document.getElementById('itemPopupUpgradeRow');
  const upBtn    = document.getElementById('itemPopupUpgradeBtn');
  const upX10Btn = document.getElementById('itemPopupUpgradeX10Btn');
  if(!popup) return;

  const it = arena.items[slotKey];
  slotEl.textContent = (ARENA_SLOT_LABELS[slotKey] || slotKey).toUpperCase();

  if(!it){
    iconEl.textContent = ARENA_SLOT_ICONS[slotKey] || '⬜';
    iconEl.style.color = '#5a4499';
    nameEl.textContent = 'Vazio';
    nameEl.style.color = '#9b8fc4';
    metaEl.textContent = 'Sem item equipado neste slot';
    primaryEl.className = 'primary empty';
    primaryEl.textContent = '— · forje um item pra equipar';
    subsEl.innerHTML = '';
    lvlRow.style.display = 'none';
    upRow.classList.add('hidden');
    return;
  }

  const era = eraOfItem(it);
  iconEl.textContent = it.icon || '⚔️';
  iconEl.style.color = era.color;
  nameEl.textContent = it.name;
  nameEl.style.color = era.color;
  const combo = it.combo ? ` · ${it.combo}` : '';
  metaEl.innerHTML = `<span style="color:${era.color}">${era.name}</span>${combo}`;

  // stat primário escalado por currentLevel
  const curLvl = it.currentLevel || it.level || 1;
  const maxLvl = it.maxLevel || MAX_ITEM_LEVEL;
  const primaryRaw = getDisplayedBaseStat(it);
  primaryEl.className = 'primary';
  primaryEl.innerHTML = fmtStatValue(it.stat, primaryRaw);

  // preview do próximo upgrade
  if(curLvl < maxLvl){
    const nextLvl = curLvl + 1;
    const nextRaw = baseStat(it.slot, it.eraIdx, nextLvl);
    const delta = nextRaw - primaryRaw;
    const isFlat = (it.stat === 'dmg' || it.stat === 'maxHp' || it.stat === 'pickupRange' || it.stat === 'projectiles');
    const deltaTxt = isFlat ? `+${delta.toFixed(1)}` : `+${(delta*100).toFixed(1)}%`;
    primaryEl.innerHTML += ` <span style="font-size:11px;color:#4cf08e;font-weight:normal"> (▲ ${deltaTxt} no próx)</span>`;
  }

  // barra de level + label
  lvlRow.style.display = '';
  curLvlEl.textContent = curLvl;
  maxLvlEl.textContent = maxLvl;
  lvlFill.style.width = (curLvl / maxLvl * 100) + '%';

  // substats com valores escalados
  subsEl.innerHTML = buildSubstatsHtml(it, null) || '';

  // upgrade buttons
  upRow.classList.remove('hidden');
  const cost = upgradeCost(it.eraIdx, curLvl);
  const canUp = curLvl < maxLvl && arena.carrots >= cost;
  if(curLvl >= maxLvl){
    upBtn.disabled = true;
    upBtn.textContent = '✦ MAX';
    upX10Btn.style.display = 'none';
  } else {
    upBtn.disabled = !canUp;
    upBtn.textContent = `⬆ UPGRADE (${cost} 🥕)`;
    // x10: custo agregado dos próximos 10 levels (cap em maxLvl)
    upX10Btn.style.display = '';
    const target10 = Math.min(maxLvl, curLvl + 10);
    const cost10 = totalUpgradeCost(it.eraIdx, curLvl, target10);
    upX10Btn.disabled = !(arena.carrots >= cost10) || target10 === curLvl;
    upX10Btn.textContent = `×${target10 - curLvl}\n${cost10}🥕`;
    upX10Btn.style.whiteSpace = 'pre-line';
    upX10Btn.style.lineHeight = '1.1';
  }
}

function hideItemPopup(){
  document.getElementById('itemPopup').classList.remove('show');
  document.getElementById('itemPopupBackdrop').classList.remove('show');
}

// Click handler no frame: detecta clique no items strip (canvas) e abre popup.
// Como os items são desenhados no canvas, convertemos coord CSS → coord lógica
// e checamos a região de cada slot.
(function setupItemPopupClicks(){
  const frame = document.getElementById('frame');
  const popupEl = document.getElementById('itemPopup');
  const backdropEl = document.getElementById('itemPopupBackdrop');

  // ======= GATE GLOBAL: enquanto a popup está aberta, qualquer click
  // que NÃO seja dentro do card da popup é absorvido — fecha a popup
  // e bloqueia qualquer outra ação (item slot, botão de forge, tab bar
  // etc.) usando capture-phase + stopImmediatePropagation. =======
  frame.addEventListener('click', (e)=>{
    if(!popupEl.classList.contains('show')) return;
    if(popupEl.contains(e.target)) return; // clique dentro do card: ignora
    hideItemPopup();
    e.preventDefault();
    e.stopPropagation();
    e.stopImmediatePropagation();
  }, true); // capture: roda ANTES dos handlers de target/bubble

  // bloqueia também eventos de pointer/touch durante o gate, pra evitar
  // que botões com handlers em pointerdown/touchstart escapem
  for(const evt of ['pointerdown','mousedown','touchstart']){
    frame.addEventListener(evt, (e)=>{
      if(!popupEl.classList.contains('show')) return;
      if(popupEl.contains(e.target)) return;
      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();
    }, true);
  }

  // listener principal de clique pra abrir a popup ao clicar num slot
  frame.addEventListener('click', (e)=>{
    if(state !== STATE.ARENA_PLAY && state !== STATE.ARENA_TAB) return;
    // se a popup já está aberta, o gate acima já tratou — nada a fazer
    if(popupEl.classList.contains('show')) return;

    // Verifica se o clique caiu na região do items strip (canvas)
    const rect = frame.getBoundingClientRect();
    if(rect.width === 0 || rect.height === 0) return;
    const cssX = e.clientX - rect.left;
    const cssY = e.clientY - rect.top;
    const lx = cssX / rect.width  * W;
    const ly = cssY / rect.height * H;

    const slotW = 42, slotH = 68, gap = 2;
    const sy = ARENA.BOT_Y + 12;
    if(ly < sy || ly > sy + slotH) return;

    const totalW = ARENA_SLOTS.length*slotW + (ARENA_SLOTS.length-1)*gap;
    const sx0 = (W - totalW)/2;
    if(lx < sx0 || lx > sx0 + totalW) return;
    const offset = lx - sx0;
    const slotIdx = Math.floor(offset / (slotW + gap));
    if(slotIdx < 0 || slotIdx >= ARENA_SLOTS.length) return;
    const slot = ARENA_SLOTS[slotIdx];
    showItemPopup(slot);
  });
})();

function buildArenaTabContent(key){
  if(key === 'hero'){
    const ms = arena.baseMoveSpeed * (1 + arenaTotalStat('moveSpeed'));
    return `<div class="stats">
      <div class="row"><span>Nível</span><span>${arena.level}</span></div>
      <div class="row"><span>HP</span><span>${Math.ceil(arena.hp)}/${arena.maxHp}</span></div>
      <div class="row"><span>Dano (espada)</span><span>${arenaTotalStat('dmg').toFixed(1)}</span></div>
      <div class="row"><span>Vel. Ataque</span><span>${(1+arenaTotalStat('atkSpeed')).toFixed(2)}×</span></div>
      <div class="row"><span>Vel. Movimento</span><span>${ms.toFixed(2)}</span></div>
      <div class="row"><span>Crit</span><span>${(arenaTotalStat('crit')*100).toFixed(0)}%</span></div>
      <div class="row"><span>Dodge</span><span>${(arenaTotalStat('dodge')*100).toFixed(0)}%</span></div>
      <div class="row"><span>XP Multiplicador</span><span>${arenaTotalStat('xpMult').toFixed(2)}×</span></div>
      <div class="row"><span>Raio coleta</span><span>${(arena.basePickupRange + arenaTotalStat('pickupRange')).toFixed(0)}px</span></div>
      <div class="row"><span>Lâmina (arc/range)</span><span>+${arenaTotalStat('projectiles').toFixed(0)}</span></div>
      <div class="row"><span>Kills</span><span>${arena.killCount}</span></div>
    </div>`;
  }
  if(key === 'equipe'){
    let html = '';
    for(const slot of ARENA_SLOTS){
      const it = arena.items[slot];
      const slotLabel = ARENA_SLOT_LABELS[slot] || slot;
      if(it){
        html += `<div class="row" style="color:${RARITY[it.rarity].color}">
          <span>${it.icon} ${it.name} <small style="opacity:.6">(${slotLabel})</small></span>
          <span>${RARITY[it.rarity].name} • +${it.value} ${it.stat}</span>
        </div>`;
      } else {
        html += `<div class="row">
          <span style="color:#9b8fc4">${ARENA_SLOT_ICONS[slot]} ${slotLabel}</span>
          <span style="color:#5a4499">vazio</span>
        </div>`;
      }
    }
    return `<div class="stats">${html}</div>
      <p style="color:#9b8fc4;font-size:11px;margin-top:10px;text-align:center">Itens dropam dos inimigos ou via FORGE. Slots auto-equipam o melhor.</p>`;
  }
  if(key === 'world'){
    const t = Math.floor((performance.now()-arena.startTime)/1000);
    return `<div class="stats">
      <div class="row"><span>Stage atual</span><span style="color:#ffcc3d">${stageLabel(arena.stage)} (Wave ${arena.wave}/${WAVES_PER_STAGE})</span></div>
      <div class="row"><span>Stage máximo atingido</span><span style="color:#4cf08e">${stageLabel(arena.maxStageReached)}</span></div>
      <div class="row"><span>🗺 Bosses derrotados</span><span>${arena.regions}</span></div>
      <div class="row"><span>Total kills</span><span>${arena.killCount}</span></div>
      <div class="row"><span>Tempo na arena</span><span>${t}s</span></div>
    </div>
    <p class="em-breve">Mapa estratégico 4X — em breve.<br/>Cada stage clear = bônus de cenouras + novo tier de inimigos.</p>`;
  }
  if(key === 'shop'){
    // era mais provável no nível atual
    const probs = getEraProbabilities(arena.forgeLevel);
    let bestIdx = 0, bestP = -1;
    for(let i=0;i<probs.length;i++){ if(probs[i] > bestP){ bestP = probs[i]; bestIdx = i; } }
    const bestEra = ERAS[bestIdx];
    return `<div class="stats">
      <div class="row"><span>🥬 Alface</span><span style="color:#4cf08e">${arena.lettuce}</span></div>
      <div class="row"><span>🥕 Cenouras</span><span style="color:#ff9b3a">${arena.carrots}</span></div>
      <div class="row"><span>Custo da forja</span><span style="color:#ffcc3d">${FORGE_BASE_COST} 🥬 · ${FORGE_MAX_REROLLS} rerolls grátis</span></div>
      <div class="row"><span>Era mais provável (forge lv ${arena.forgeLevel})</span><span style="color:${bestEra.color}">${bestEra.name} ${(bestP*100).toFixed(0)}%</span></div>
    </div>
    <p class="em-breve">Cenouras dropam de cada inimigo (bosses dão +10).<br/>Use no botão FORGE pra rolar os dados e forjar.</p>`;
  }
  if(key === 'growth'){
    return `<p class="em-breve">Meta-progressão permanente em breve.<br/>Upgrades persistentes entre runs (skill tree).</p>`;
  }
  if(key === 'mission'){
    return `<p class="em-breve">Missões diárias e semanais em breve.<br/>Recompensas por matar X inimigos, sobreviver Y minutos, etc.</p>`;
  }
  return '<p class="em-breve">Em breve.</p>';
}

const ARENA_TAB_TITLES = {
  shop:'🛒 SHOP', hero:'👤 HERO', growth:'📈 GROWTH',
  combat:'▲ COMBAT',
  equipe:'🎽 EQUIPE', mission:'📋 MISSION', world:'🗺 WORLD'
};

function setActiveArenaTab(key){
  for(const btn of document.querySelectorAll('.arenaTab-btn')){
    btn.classList.toggle('active', btn.dataset.tab === key);
  }
}

function switchArenaTab(key){
  if(state !== STATE.ARENA_PLAY && state !== STATE.ARENA_TAB) return;
  // se já está nessa tab, ignora
  const sameAsCombat = (key === 'combat' && state === STATE.ARENA_PLAY);
  setActiveArenaTab(key);
  if(key === 'combat'){
    // volta pro gameplay
    document.getElementById('arenaTab').classList.remove('show');
    state = STATE.ARENA_PLAY;
    return;
  }
  // outras tabs: troca conteúdo, mantém tab bar visível, pausa o jogo
  document.getElementById('arenaTabTitle').textContent = ARENA_TAB_TITLES[key] || key;
  document.getElementById('arenaTabContent').innerHTML = buildArenaTabContent(key);
  // mostra apenas a layer arenaTab (sem hide-all-show pra evitar reset visual de outras)
  document.getElementById('arenaTab').classList.add('show');
  state = STATE.ARENA_TAB;
}

// hook nos botões da tab bar
for(const btn of document.querySelectorAll('.arenaTab-btn')){
  btn.addEventListener('click', ()=>{
    switchArenaTab(btn.dataset.tab);
  });
}

document.getElementById('arenaRetryBtn').addEventListener('click', enterArena);
document.getElementById('arenaBossBtn').addEventListener('click', challengeBoss);
document.getElementById('arenaAutoBtn').addEventListener('click', ()=>{
  arena.autoMove = !arena.autoMove;
  const ab = document.getElementById('arenaAutoBtn');
  ab.classList.toggle('active', arena.autoMove);
  ab.textContent = 'AUTO'; // estado ON/OFF é só pela cor do botão (active class)
});

// ============ MAIN LOOP (fixed 60Hz timestep) ============
const FIXED_DT = 1000/60;
let last = performance.now();
let acc = 0;
function loop(now){
  let frame = now - last;
  last = now;
  if(frame > 250) frame = 250; // clamp after tab switch
  acc += frame;
  // run as many fixed steps as needed (max 4 per frame to avoid spiral of death)
  let steps = 0;
  while(acc >= FIXED_DT && steps < 4){
    if(state === STATE.ARENA_PLAY) updateArena();
    acc -= FIXED_DT;
    steps++;
  }
  if(steps === 4) acc = 0;

  // joystick zone: restringe à play area da arena (grid onde o coelho pode andar)
  const joyEl = document.getElementById('joy');
  if(state === STATE.ARENA_PLAY){
    joyEl.style.top = (ARENA.TOP_Y/H*100) + '%';
    joyEl.style.bottom = ((H-ARENA.BOT_Y)/H*100) + '%';
    joyEl.style.height = 'auto';
    joyEl.classList.remove('disabled');
  } else {
    joyEl.classList.add('disabled');
  }

  // AUTO toggle só visível na arena
  const autoEl = document.getElementById('arenaAutoBtn');
  if(state === STATE.ARENA_PLAY) autoEl.classList.add('show');
  else autoEl.classList.remove('show');

  // BOSS challenge button: só aparece DEPOIS que o player perdeu pra esse boss pelo menos uma vez
  const bossBtn = document.getElementById('arenaBossBtn');
  if(state === STATE.ARENA_PLAY
     && arena.failedBossCurrentStage
     && arena.wave < WAVES_PER_STAGE
     && arena.waveState !== 'stage_clear'){
    bossBtn.classList.add('show');
  } else {
    bossBtn.classList.remove('show');
  }

  // Tab bar visível durante ARENA_PLAY e ARENA_TAB (pra poder navegar)
  const tabBarEl = document.getElementById('arenaTabBar');
  if(state === STATE.ARENA_PLAY || state === STATE.ARENA_TAB) tabBarEl.classList.add('show');
  else tabBarEl.classList.remove('show');

  // FORGE inline strip: dados + LV + AUTO; visível só em ARENA_PLAY
  const forgeInline = document.getElementById('arenaForgeInline');
  const forgeLvBtn = document.getElementById('arenaForgeLevelBtn');
  const forgeLvNum = document.getElementById('forgeLevelNum');
  if(state === STATE.ARENA_PLAY){
    forgeInline.classList.add('show');
    // FORGE LV: atualiza número e pisca se pode upgrade
    if(forgeLvNum) forgeLvNum.textContent = arena.forgeLevel;
    if(canUpgradeForge()) forgeLvBtn.classList.add('upgradable');
    else forgeLvBtn.classList.remove('upgradable');
    // atualiza estado da strip de dados (texto do botão, cenouras, combo, etc)
    renderForgeDice();
  } else {
    forgeInline.classList.remove('show');
  }

  renderArena();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// prevent context menu on long press
window.addEventListener('contextmenu', e=>e.preventDefault());

// boot direto na Loot Arena
enterArena();
</script>
