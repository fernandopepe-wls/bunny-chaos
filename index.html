<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="theme-color" content="#0d0a1a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<title>Bunny Chaos! Loot Arena — MVP</title>
<style>
  :root{
    --bg:#0d0a1a; --panel:#1a1330; --panel2:#241a44;
    --accent:#ffcc3d; --accent2:#ff5fa2; --good:#4cf08e; --bad:#ff5252;
    --ink:#fff7e0; --muted:#9b8fc4;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{
    height:100%;
    background:#0d0a1a; /* fallback escuro pra evitar tarja branca por baixo da safari toolbar */
  }
  body{
    height:100%;
    min-height:100vh;
    min-height:100dvh; /* dynamic viewport: ajusta com toolbar Safari */
    background:#0d0a1a;
    color:var(--ink);
    font-family:'Trebuchet MS',system-ui,sans-serif;
    -webkit-tap-highlight-color:transparent;
    overflow:hidden;
    touch-action:none;
    user-select:none;
    overscroll-behavior:none;
  }
  #stage{
    position:fixed;inset:0;
    background:radial-gradient(circle at 50% 0%,#2a1a55 0%,#0d0a1a 70%);
    display:flex;align-items:center;justify-content:center;
    /* safe area pro notch / home indicator do iOS */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
  #frame{
    position:relative;
    /* Mobile/standalone: frame OCUPA TODA a area visivel (descontando
       safe-area do notch/home indicator), sem manter aspect ratio fixo.
       Canvas estica levemente em telas que nao sao exatamente 9:20
       (iPhone 16 Pro e 9:19.5 → ~1-2% de stretch, imperceptivel). */
    --frame-avail-w: calc(100vw - env(safe-area-inset-left) - env(safe-area-inset-right));
    --frame-avail-h: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    width:  var(--frame-avail-w);
    height: var(--frame-avail-h);
    background:#0a0716;
    overflow:hidden;
  }
  /* desktop: cap como "moldura" de celular moderno (9:20) com letterbox */
  @media (min-width: 768px) and (min-height: 600px){
    #frame{
      width:  min(var(--frame-avail-w), calc(var(--frame-avail-h) * 9 / 20));
      height: min(var(--frame-avail-h), calc(var(--frame-avail-w) * 20 / 9));
      max-width:432px;
      max-height:960px;
      border-radius:12px;
      box-shadow:0 0 40px rgba(255,95,162,.25), inset 0 0 0 2px #2a1a55;
    }
  }
  canvas{display:block;width:100%;height:100%;image-rendering:pixelated;}

  /* aviso de orientação landscape em telas pequenas */
  #rotateOverlay{
    position:fixed;inset:0;display:none;
    flex-direction:column;
    align-items:center;justify-content:center;
    background:#0d0a1a;color:var(--ink);
    text-align:center;font-size:18px;padding:24px;gap:14px;
    z-index:1000;
  }
  #rotateOverlay .icon{font-size:48px;animation:rotateNudge 2s infinite;}
  @keyframes rotateNudge{
    0%,100%{transform:rotate(-90deg);}
    50%{transform:rotate(0deg);}
  }
  @media (orientation: landscape) and (max-height: 500px){
    #rotateOverlay{display:flex;}
  }

  /* overlays */
  .layer{
    position:absolute;inset:0;display:none;flex-direction:column;
    align-items:stretch;justify-content:center;padding:24px;
    background:linear-gradient(180deg,rgba(10,7,22,.85),rgba(10,7,22,.95));
    z-index:10;
  }
  .layer.show{display:flex;}
  h1{font-size:28px;letter-spacing:1px;text-align:center;color:var(--accent);
    text-shadow:0 3px 0 #b3791f, 0 6px 18px rgba(255,204,61,.35);}
  h1 small{display:block;font-size:14px;color:var(--accent2);letter-spacing:2px;margin-top:6px;}
  h2{font-size:20px;color:var(--accent);text-align:center;margin-bottom:8px;}
  p{color:var(--muted);font-size:13px;line-height:1.4;text-align:center;}
  .btn{
    appearance:none;border:0;cursor:pointer;
    padding:14px 18px;margin:6px 0;border-radius:12px;
    background:linear-gradient(180deg,var(--accent),#e6a823);
    color:#3a230b;font-weight:bold;font-size:16px;letter-spacing:1px;
    box-shadow:0 4px 0 #8a5e10, 0 8px 16px rgba(0,0,0,.4);
    transition:transform .05s;
  }
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 #8a5e10;}
  .btn.secondary{background:linear-gradient(180deg,#5a4499,#3b2a70);color:#fff;box-shadow:0 4px 0 #2a1a55;}
  .btn.locked{background:#2a223f;color:#5a4f7a;cursor:not-allowed;box-shadow:none;}
  .modes{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
  .mode{
    display:flex;align-items:center;gap:12px;
    background:var(--panel);padding:12px;border-radius:14px;
    border:2px solid #2a1f4d;
  }
  .mode .icon{
    width:48px;height:48px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    background:#2a1f4d;font-size:24px;
  }
  .mode .info{flex:1;}
  .mode .info .name{font-weight:bold;color:var(--ink);font-size:14px;}
  .mode .info .desc{color:var(--muted);font-size:11px;margin-top:2px;}
  .mode.active{border-color:var(--accent);box-shadow:0 0 18px rgba(255,204,61,.25);}
  .mode.active .icon{background:linear-gradient(180deg,var(--accent),#e6a823);color:#3a230b;}
  .mode.locked{opacity:.55;}
  .mode.locked .badge{font-size:10px;color:var(--muted);background:#2a1f4d;padding:3px 8px;border-radius:6px;}

  /* upgrade screen */
  .upgrade-card{
    background:var(--panel);border:2px solid var(--accent2);border-radius:14px;
    padding:14px;margin:6px 0;cursor:pointer;
    transition:transform .1s, border-color .1s;
  }
  .upgrade-card:active{transform:scale(.98);}
  .upgrade-card.disabled{opacity:.4;cursor:not-allowed;border-color:#2a1f4d;}
  .upgrade-card .head{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .upgrade-card .icon{font-size:28px;}
  .upgrade-card .title{font-weight:bold;color:var(--accent);font-size:14px;}
  .upgrade-card .body{color:var(--muted);font-size:12px;line-height:1.4;}

  .combo-table{
    background:#0f0a22;border-radius:10px;padding:10px;margin-top:8px;
    font-size:11px;color:var(--muted);
  }
  .combo-table .row{display:flex;justify-content:space-between;padding:2px 0;}
  .combo-table .row b{color:var(--accent);}

  /* gameover */
  .stats{background:var(--panel);border-radius:12px;padding:14px;margin:14px 0;}
  .stats .row{display:flex;justify-content:space-between;padding:4px 0;}
  .stats .row span:last-child{color:var(--accent);font-weight:bold;}

  /* joystick */
  #joy{
    position:absolute;left:0;right:0;bottom:0;height:42%;
    pointer-events:auto;
    z-index:5;
  }
  #joy.disabled{pointer-events:none;}
  #joyKnob{
    position:absolute;width:80px;height:80px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#fff7e0,#ffcc3d 60%,#b3791f);
    box-shadow:0 0 24px rgba(255,204,61,.5);
    pointer-events:none;display:none;
    transform:translate(-50%,-50%);
  }
  #joyBase{
    position:absolute;width:140px;height:140px;border-radius:50%;
    border:3px solid rgba(255,204,61,.4);
    background:rgba(0,0,0,.25);
    pointer-events:none;display:none;
    transform:translate(-50%,-50%);
  }

  /* ===== ARENA FORGE INLINE (substitui forgeDice popup) ===== */
  /* Items strip vai do logical y=404 a y=480 (51% a 60% do frame).
     Tab bar é 54px CSS no rodapé. O forge widget fica centralizado no gap
     entre items strip e tab bar, com calc responsiva.
     Para frame 852 → bottom ≈ 117; para 960 → bottom ≈ 138; para 720 → ≈ 92. */
  #arenaForgeInline{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom: calc(19.4% - 48px);
    width:min(96%, 380px);
    display:none;
    flex-direction:column;
    gap:8px;
    z-index:6;
  }
  #arenaForgeInline.show{display:flex;}
  .forge-dice-strip{
    display:flex;align-items:stretch;gap:6px;
  }
  .forge-dice-row{
    flex:1;
    display:flex;justify-content:space-between;gap:4px;
    background:rgba(13,10,26,0.6);
    border:2px solid #5a4499;
    border-radius:8px;
    padding:4px;
  }
  .forge-dice-row .forge-die{
    flex:1;
    aspect-ratio:1/1;
    width:auto;height:auto;
    min-width:0;
    font-size:48px;
    line-height:0.95;
  }
  /* o glifo Unicode tem padding interno; ampliamos visualmente via scale
     pra ele preencher mais o quadrado do dado */
  .forge-dice-row .forge-die .face{
    display:inline-block;
    transform:scale(1.35);
    transform-origin:center center;
  }
  .forge-side-col{
    display:flex;flex-direction:column;gap:4px;
    width:44px;flex-shrink:0;
  }
  .forge-action-row{
    display:flex;gap:6px;
  }
  .forge-main-btn{
    flex:1;
    height:38px;
    border:0;cursor:pointer;
    border-radius:8px;
    background:linear-gradient(180deg,#ff7a1a,#c04a0a);
    border:2px solid #ffcc3d;
    color:#3a230b;
    font-size:13px;font-weight:bold;letter-spacing:1.5px;
    box-shadow:0 3px 0 #6b2a05, 0 0 16px rgba(255,140,40,.35);
  }
  .forge-main-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #6b2a05;}
  .forge-main-btn.confirm{
    background:linear-gradient(180deg,#4cf08e,#2aa860);
    border-color:#88f0a8;
    color:#0d2a1a;
    box-shadow:0 3px 0 #1a6a3a, 0 0 16px rgba(76,240,142,.35);
  }
  .forge-main-btn[disabled]{
    opacity:0.55;cursor:not-allowed;
    background:linear-gradient(180deg,#5a4499,#3b2a70);
    border-color:#5a4499;color:#9b8fc4;
    box-shadow:0 3px 0 #2a1a55;
  }
  .forge-info-row{
    position:relative;
    text-align:center;
    font-weight:bold;letter-spacing:.6px;
    padding:2px 4px;
    text-shadow:0 1px 2px rgba(0,0,0,.8);
    min-height:22px;
    display:flex;align-items:center;justify-content:center;
  }

  /* ===== POPUP DE DETALHE DE ITEM (cobre só a metade de baixo) ===== */
  /* Backdrop escurece só dos items pra baixo; o grid de gameplay
     em cima fica visível. Aparece quando .show é adicionada via JS. */
  #itemPopupBackdrop{
    position:absolute;
    left:0;right:0;
    /* topo do items strip = ARENA.BOT_Y+4 = 404 lógico / 800 = 50.5% (grid trava em 50%) */
    top: 50.5%;
    bottom:0;
    background: rgba(0,0,0,0.75);
    display:none;
    z-index:8;
    cursor:pointer;
    /* flex centra a popup verticalmente entre o items strip e o tab bar */
    align-items:center;
    justify-content:center;
    padding: 8px 4%;
    padding-bottom: 73px; /* reserva espaço pro tab bar (65 + 8 margem) */
    box-sizing:border-box;
  }
  #itemPopupBackdrop.show{display:flex;}
  #itemPopup{
    position:relative;
    width:100%;
    max-width:380px;
    background:linear-gradient(180deg,#1a1330,#0d0a1a);
    border:2px solid #5a4499;
    border-radius:12px;
    padding:12px 14px 10px;
    color:var(--ink);
    box-shadow:0 6px 24px rgba(0,0,0,0.6);
    cursor:default;
  }
  #itemPopup .head{
    display:flex;align-items:center;gap:10px;
    padding-bottom:8px;border-bottom:1px solid #2a1f4d;
    margin-bottom:8px;
  }
  #itemPopup .ico{font-size:32px;line-height:1;}
  #itemPopup .head-info{flex:1;min-width:0;}
  #itemPopup .nm{font-size:15px;font-weight:bold;letter-spacing:.4px;}
  #itemPopup .meta{font-size:11px;color:#9b8fc4;margin-top:2px;}
  #itemPopup .slot-label{
    font-size:9px;color:#5a4499;letter-spacing:1.2px;
    padding:2px 6px;background:#241a44;border-radius:4px;
  }
  #itemPopup .primary{
    font-size:13px;font-weight:bold;color:#ffcc3d;
    text-align:center;margin:4px 0 8px;
    text-shadow:0 1px 0 #6b4a05;
  }
  #itemPopup .primary.empty{color:#5a4499;font-weight:normal;}
  #itemPopup .subs{
    display:flex;flex-direction:column;gap:4px;
    max-height:35vh;overflow-y:auto;
  }
  #itemPopup .subs .substat-row{font-size:11px;}
  #itemPopup .level-row{
    display:flex;align-items:center;gap:8px;
    margin:6px 0 8px;
    font-size:11px;color:#9b8fc4;font-weight:bold;
  }
  #itemPopup .level-label{flex-shrink:0;min-width:60px;}
  #itemPopup .level-bar{
    flex:1;height:8px;background:rgba(0,0,0,0.4);
    border-radius:4px;overflow:hidden;
  }
  #itemPopup .level-bar > span{
    display:block;height:100%;
    background:linear-gradient(90deg,#88daf0,#5fb0d8);
    transition:width .25s;
  }
  #itemPopup .upgrade-row{
    display:flex;gap:6px;margin-top:6px;
  }
  #itemPopup .btn-upgrade{
    flex:1;height:32px;
    border:0;cursor:pointer;border-radius:8px;
    background:linear-gradient(180deg,#88daf0,#2a6f95);
    border:2px solid #cdebf5;
    color:#0d2a3a;
    font-size:12px;font-weight:bold;letter-spacing:.6px;
    box-shadow:0 3px 0 #1a4a6a;
  }
  #itemPopup .btn-upgrade.x10{flex:0 0 60px;}
  #itemPopup .btn-upgrade:active{transform:translateY(2px);box-shadow:0 1px 0 #1a4a6a;}
  #itemPopup .btn-upgrade[disabled]{
    opacity:0.5;cursor:not-allowed;
    background:linear-gradient(180deg,#5a4499,#3b2a70);
    border-color:#5a4499;color:#9b8fc4;
    box-shadow:0 3px 0 #2a1a55;
  }
  #itemPopup .upgrade-row.hidden{display:none;}

  #itemPopup .footer-hint{
    text-align:center;font-size:10px;color:#5a4499;
    margin-top:8px;letter-spacing:.5px;
  }
  /* combo agora ocupa o centro inteiro, maior */
  #forgeComboInline{
    color:#9b8fc4;
    font-size:17px;
    letter-spacing:1px;
  }
  /* cenouras flutuam à direita sem disputar espaço com o combo */
  #arenaCarrotsCount{
    position:absolute;
    right:6px;top:50%;
    transform:translateY(-50%);
    color:#ff9b3a;
    font-size:11px;
  }

  /* LV e AUTO compactos (lado direito da strip de dados) */
  #arenaForgeLevelBtn, #arenaForgeAutoBtn{
    width:100%;
    height:30px;
    border:0;cursor:pointer;
    border-radius:6px;
    font-weight:bold;letter-spacing:.5px;
    padding:1px;font-size:8px;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    line-height:1;
    flex-shrink:0;
  }
  #arenaForgeLevelBtn{
    background:linear-gradient(180deg,#5fb0d8,#2a6f95);
    border:2px solid #88daf0;
    color:#0d2a3a;
    box-shadow:0 3px 0 #1a4a6a, 0 0 10px rgba(95,176,216,.3);
  }
  #arenaForgeLevelBtn:active{transform:translateY(1px);}
  #arenaForgeLevelBtn .lvNum{font-size:13px;color:#0d2a3a;line-height:1;}
  #arenaForgeLevelBtn.upgradable{
    animation:forgePulse 1s infinite;
    border-color:#ffcc3d;
  }
  @keyframes forgePulse{
    0%,100%{box-shadow:0 3px 0 #1a4a6a, 0 0 10px rgba(255,204,61,.4);}
    50%{box-shadow:0 3px 0 #1a4a6a, 0 0 18px rgba(255,204,61,.8);}
  }

  #arenaForgeAutoBtn{
    background:linear-gradient(180deg,#5a4499,#3b2a70);
    color:var(--ink);
    border:2px solid #7a5fc4;
    box-shadow:0 3px 0 #2a1a55;
  }
  #arenaForgeAutoBtn.active{
    background:linear-gradient(180deg,#4cf08e,#2aa860);
    color:#0d2a1a;
    border-color:#88f0a8;
    box-shadow:0 3px 0 #1a6a3a;
  }
  #arenaForgeAutoBtn:active{transform:translateY(1px);}
  /* desabilitado temporariamente (bug com proximas waves) */
  #arenaForgeAutoBtn[disabled]{
    opacity:0.4;
    cursor:not-allowed;
    filter:grayscale(0.6);
    pointer-events:none;
  }

  /* forge level probabilities (estilo tabela) */
  .forge-level-cols{
    display:flex;align-items:center;gap:8px;
    padding:0 10px;margin:10px 0 4px;
    font-size:10px;color:#9b8fc4;
    letter-spacing:.5px;
  }
  .forge-level-cols .spacer{flex:1;}
  .forge-level-cols .col-cur,
  .forge-level-cols .col-next{
    min-width:46px;text-align:right;font-weight:bold;
  }
  .forge-level-cols .col-cur{color:#fff7e0;}
  .forge-level-cols .col-next{color:#ffcc3d;}
  .forge-prob-list{display:flex;flex-direction:column;gap:3px;}
  .forge-prob-row{
    display:flex;align-items:center;gap:8px;
    border-radius:6px;
    padding:7px 10px;
    border:1px solid rgba(255,255,255,0.08);
  }
  .forge-prob-row.locked{opacity:0.45;}
  .forge-prob-row .ico{font-size:18px;width:24px;text-align:center;line-height:1;}
  .forge-prob-row .name{
    flex:1;font-size:12px;font-weight:bold;
    color:#fff;text-shadow:0 1px 0 rgba(0,0,0,0.6);
    letter-spacing:.3px;
  }
  .forge-prob-row .pct{
    font-size:11px;font-weight:bold;
    min-width:46px;text-align:right;
    color:#fff;text-shadow:0 1px 0 rgba(0,0,0,0.7);
  }
  .forge-prob-row .pct.next{opacity:0.7;}

  /* forge comparison popup */
  #forgeCompare h2{color:#ff7a1a;text-shadow:0 2px 0 #6b2a05;}
  .forge-cards{display:flex;align-items:stretch;gap:8px;margin:14px 0;}
  .forge-card{
    flex:1;
    background:var(--panel);
    border-radius:12px;
    padding:12px 8px;
    border:2px solid #2a1f4d;
    display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;
  }
  .forge-card.empty{opacity:0.55;}
  .forge-card .label{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;}
  .forge-card .ico{font-size:32px;line-height:1;}
  .forge-card .nm{font-weight:bold;font-size:12px;letter-spacing:.4px;}
  .forge-card .rare{font-size:10px;letter-spacing:.5px;text-transform:uppercase;}
  .forge-card .stat{font-size:11px;color:var(--ink);}
  .forge-arrow{align-self:center;color:var(--accent);font-size:22px;font-weight:bold;}
  .forge-delta{font-size:11px;font-weight:bold;margin-top:4px;}
  .forge-up{color:var(--good);}
  .forge-down{color:var(--bad);}
  .forge-equal{color:var(--muted);}
  .forge-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .forge-actions .btn{flex:1;min-width:0;}

  /* === FORGE — DICE ROLL POPUP === */
  #forgeDice h2{color:#ffcc3d;text-shadow:0 2px 0 #6b4a05;}
  #forgeDiceArea{
    display:flex;justify-content:center;gap:8px;margin:18px 0 12px;
  }
  .forge-die{
    width:52px;height:52px;
    background:#fff7e0;color:#0d0a1a;
    border:2px solid #b3791f;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:30px;line-height:1;
    cursor:pointer;
    transition:transform .06s, background .12s;
    box-shadow:0 3px 0 #6b4a05;
    user-select:none;
  }
  .forge-die.held{
    background:#378ADD;color:#fff7e0;
    border-color:#185FA5;
    box-shadow:0 3px 0 #0c447c, 0 0 14px rgba(55,138,221,.4);
  }
  .forge-die.rolling{
    animation:diceRoll .08s infinite;
  }
  @keyframes diceRoll{
    0%   { transform:translateY(0) rotate(0deg); }
    50%  { transform:translateY(-3px) rotate(8deg); }
    100% { transform:translateY(0) rotate(-8deg); }
  }
  .forge-die.disabled{opacity:0.6;pointer-events:none;}

  /* Glow nos dados que participam do combo atual; cor vem de --combo-color
     (definido inline em JS). Amarelo → vermelho conforme o tier.
     Background também pintado da cor do combo pra ficar bem evidente
     visualmente — pontos pretos do dado ficam legíveis em qualquer cor. */
  .forge-die.combo-glow{
    background: var(--combo-color, #FFCC3D);
    border-color: var(--combo-color, #FFCC3D);
    color: #0d0a1a;
    box-shadow:
      0 3px 0 rgba(0,0,0,0.55),
      0 0 16px var(--combo-color, #FFCC3D);
    animation: comboPulse 1.1s ease-in-out infinite;
  }
  /* held + combo: mantém fundo azul do held mas marca a borda com a cor do combo */

<script>
"use strict";

// ============ CONFIG ============
const W = 360, H = 800; // logical portrait resolution (9:20 — modern phones)
const HUD_TOP = 96;
const HUD_BOT = 56;
const PLAY_TOP = HUD_TOP;
const PLAY_BOT = H - HUD_BOT;

const BUNNY_W = 22, BUNNY_H = 26;
const GRAVITY = 0.38;
const JUMP_VY = -9.12;         // +20% jump distance/airtime
const MOVE_SPEED = 2.244; // +20% +10%
const SHOOT_INTERVAL = 36;     // frames between shots
const PROJECTILE_SPEED = 4.5;
const LAND_SHOOT_BUFFER = 12;  // 0.2s @ 60fps before shooting after landing
const WALL_SLIDE_VY = 1.6;     // velocidade máxima de queda enquanto desliza na parede
const DICE_REROLL_INTERVAL = 60; // frames

// (Tabela legada COMBO foi removida — apenas COMBO_DATA é usado, definido junto da forja.)

// ============ STATE ============
const STATE = { ARENA_PLAY:8, ARENA_LEVELUP:9, ARENA_GAMEOVER:10, ARENA_TAB:11 };
let state = STATE.ARENA_PLAY;

function hideAllLayers(){
  for(const id of ['arenaGameover','arenaTab','forgeCompare','forgeLevelLayer']){
    const el = document.getElementById(id);
    if(el) el.classList.remove('show');
  }
}
function showLayer(id){
  hideAllLayers();
  document.getElementById(id).classList.add('show');
}

function tryFullscreen(){
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if(req){
    try { req.call(el).catch(()=>{}); } catch(e){}
  }
  if(screen.orientation && screen.orientation.lock){
    try { screen.orientation.lock('portrait').catch(()=>{}); } catch(e){}
  }
}

// ============ CANVAS SETUP ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function fitCanvas(){
  const r = canvas.getBoundingClientRect();
  if(r.width === 0 || r.height === 0){
    // layout não pronto ainda — tenta de novo no próximo frame
    requestAnimationFrame(fitCanvas);
    return;
  }
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = Math.round(r.width  * dpr);
  canvas.height = Math.round(r.height * dpr);
}
fitCanvas();
window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', ()=>setTimeout(fitCanvas, 100));
// safety: refita após primeiro paint em caso de timing weird
requestAnimationFrame(fitCanvas);
const scaleX = () => canvas.width  / W;
const scaleY = () => canvas.height / H;

function setupCtx(){
  ctx.imageSmoothingEnabled = false;
  ctx.setTransform(scaleX(),0,0,scaleY(),0,0);
}

function drawDieFace(x,y,w,h,value){
  ctx.fillStyle = '#0d0a1a';
  const pipMap = {
    1:[[1,1]],
    2:[[0,0],[2,2]],
    3:[[0,0],[1,1],[2,2]],
    4:[[0,0],[2,0],[0,2],[2,2]],
    5:[[0,0],[2,0],[1,1],[0,2],[2,2]],
    6:[[0,0],[2,0],[0,1],[2,1],[0,2],[2,2]],
  };
  const pips = pipMap[value] || [];
  const px = x+8, py = y+10;
  const cellW = (w-16)/3, cellH = (h-16)/3;
  for(const [cx,cy] of pips){
    ctx.fillRect(px+cx*cellW+cellW/2-2, py+cy*cellH+cellH/2-2, 4, 4);
  }
}

// ============ INPUT (joystick + keyboard) ============
const input = { axisX: 0, axisY: 0, jumpQueued: false, active: false, releaseAxis: 0, downHold: false, chargedJump: false };
const joyZone = document.getElementById('joy');
const joyBase = document.getElementById('joyBase');
const joyKnob = document.getElementById('joyKnob');
let joyOrigin = null;
const JOY_RADIUS = 60;

function startJoy(x,y){
  input.active = true;
  joyOrigin = {x,y};
  const frameRect = document.getElementById('frame').getBoundingClientRect();
  const localX = x - frameRect.left, localY = y - frameRect.top;
  joyBase.style.left = localX+'px'; joyBase.style.top = localY+'px';
  joyKnob.style.left = localX+'px'; joyKnob.style.top = localY+'px';
  joyBase.style.display='block'; joyKnob.style.display='block';
}
function moveJoy(x,y){
  if(!joyOrigin) return;
  let dx = x - joyOrigin.x;
  let dy = y - joyOrigin.y;
  const lenX = Math.abs(dx);
  if(lenX > JOY_RADIUS) dx = (dx/lenX) * JOY_RADIUS;
  const dyClamped = Math.max(-JOY_RADIUS, Math.min(JOY_RADIUS, dy));
  input.axisY = dyClamped / JOY_RADIUS;
  input.axisX = dx / JOY_RADIUS;
  input.downHold = false;

  const frameRect = document.getElementById('frame').getBoundingClientRect();
  const knobX = joyOrigin.x + dx - frameRect.left;
  const knobY = joyOrigin.y + dyClamped - frameRect.top;
  joyKnob.style.left = knobX+'px'; joyKnob.style.top = knobY+'px';
}
function endJoy(){
  input.active = false; input.axisX = 0; input.downHold = false; joyOrigin = null;
  joyBase.style.display='none'; joyKnob.style.display='none';
}

// touch
joyZone.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t = e.changedTouches[0];
  startJoy(t.clientX, t.clientY);
},{passive:false});
joyZone.addEventListener('touchmove', e=>{
  e.preventDefault();
  const t = e.changedTouches[0];
  moveJoy(t.clientX, t.clientY);
},{passive:false});
joyZone.addEventListener('touchend', e=>{ e.preventDefault(); endJoy(); },{passive:false});
joyZone.addEventListener('touchcancel', e=>{ e.preventDefault(); endJoy(); },{passive:false});

// mouse
let mouseDown = false;
joyZone.addEventListener('mousedown', e=>{ mouseDown = true; startJoy(e.clientX, e.clientY); });
window.addEventListener('mousemove', e=>{ if(mouseDown) moveJoy(e.clientX, e.clientY); });
window.addEventListener('mouseup', ()=>{ if(mouseDown){ mouseDown=false; endJoy(); }});

// keyboard fallback
const keys = {};
function syncKeyboardInput(){
  const left  = keys['ArrowLeft']  || keys['a'];
  const right = keys['ArrowRight'] || keys['d'];
  const up    = keys['ArrowUp']    || keys['w'];
  const down  = keys['ArrowDown']  || keys['s'];

  if(left && !right) input.axisX = -1;
  else if(right && !left) input.axisX = 1;
  else input.axisX = 0;

  if(up && !down) input.axisY = -1;
  else if(down && !up) input.axisY = 1;
  else input.axisY = 0;
}

window.addEventListener('keydown', e=>{
  keys[e.key]=true;
  syncKeyboardInput();
});
window.addEventListener('keyup', e=>{
  keys[e.key]=false;
  syncKeyboardInput();
});

function evalComboArr(diceArr){
  // Detector de combo com a precedência do design.md §4.2
  // Sequência = 4 consecutivos quaisquer (1-2-3-4, 2-3-4-5 ou 3-4-5-6).
  // Lançamento Máx. = todos diferentes E sem sequência.
  if(!diceArr || diceArr.length===0) return 'NONE';
  const counts = {};
  const values = diceArr.map(d=>d.value);
  for(const v of values) counts[v] = (counts[v]||0)+1;
  const countVals = Object.values(counts).sort((a,b)=>b-a);
  const distinct = Object.keys(counts).map(Number).sort((a,b)=>a-b);

  let hasStraight = false;
  for(let i=0; i<=distinct.length-4; i++){
    if(distinct[i+1] === distinct[i]+1
    && distinct[i+2] === distinct[i]+2
    && distinct[i+3] === distinct[i]+3){
      hasStraight = true;
      break;
    }
  }

  if(countVals[0] === 5) return 'FIVE';
  if(countVals[0] === 4) return 'FOUR';
  if(countVals[0] === 3 && countVals[1] === 2) return 'FULL';
  if(hasStraight) return 'STRAIGHT';
  if(countVals[0] === 3) return 'THREE';
  if(countVals[0] === 2 && countVals[1] === 2) return 'TWOPAIR';
  if(countVals[0] === 2) return 'PAIR';
  return 'MAXROLL';
}

// ============== FORGE — PIPELINE (design.md §5–9) ==============
// ERA_PEAK_OFFSET ajustado de 4 → 2: a fórmula original (peak=unlock+4)
// faria Divine (unlock 33) picar em lvl 37, fora do range MAX_FORGE_LEVEL=35,
// resultando em Underworld dominante no late game. Com offset=2, Divine picа
// em lvl 35 e domina (~75%) como o design §5.4 prevê.
const ERA_PEAK_OFFSET = 2;
const ERA_VARIANCE   = 8;    // denominador na gaussiana
const ERA_MIN_WEIGHT = 0.5;  // piso pra eras antigas não sumirem

// ============== LEVEL SCALING (design-level-scaling.md §11) ==============
// Cada item agora tem currentLevel (1..MAX_ITEM_LEVEL). Valor do stat primário
// e dos substats escala com level via levelFactor(L).
//
// O design propõe ERA_MULT=2.7 + WITHIN_GROWTH=1.5 (Era 10 Lv.100 = 19.063×
// Era 1 Lv.1), mas isso explode a escala de combate (inimigos só sobem 1.15×
// por stage). Aqui usamos constantes calibradas pro nosso jogo, preservando
// a constraint "Era N Lv.100 < Era N+1 Lv.1" (ERA_MULT > 1 + WITHIN_GROWTH).
const MAX_ITEM_LEVEL    = 100;
const ERA_MULT          = 1.43;  // multiplicador entre eras (≈ ratio atual)
const WITHIN_GROWTH     = 0.40;  // Lv.100 = 1.4× Lv.1 (na mesma era)
const LEVEL_CURVE_EXP   = 1.4;   // expoente da curva (back-loaded)

// Substat scaling (§4.1)
const SUBSTAT_LEVEL_FLOOR = 0.4; // Lv.1 mostra 40% do roll
const SUBSTAT_LEVEL_RANGE = 0.6; // ganha +60% até Lv.100

// Upgrade cost (§5.2) — cenouras gastas pra subir item de level
const BASE_ESSENCE        = 10;
const ESSENCE_ERA_MULT    = 1.6;
const COST_LEVEL_FACTOR   = 9;

// Initial level (§6.1) — combo determina o ponto de partida
const INITIAL_LVL_BASE_OFFSET     = 5;
const INITIAL_LVL_PERCENTILE_MULT = 75;
const INITIAL_LVL_VARIANCE_BASE   = 2;
const INITIAL_LVL_VARIANCE_MULT   = 8;

// SLOTS_DEF: stat primário e baseStat0 por slot (§2)
// baseStat0 é o valor do stat primário em Era 1 Lv.1. Para stats fracionários
// (atkSpeed, crit, moveSpeed, dodge), interpretamos como "fração base" (e.g.
// gloves.baseStat0 = 0.05 = +5% atkSpeed em Era 1 Lv.1).
const SLOTS_DEF = {
  weapon: { primaryStat:'dmg',       baseStat0: 3.0  },
  helmet: { primaryStat:'maxHp',     baseStat0: 12   },
  armor:  { primaryStat:'maxHp',     baseStat0: 18   },
  gloves: { primaryStat:'atkSpeed',  baseStat0: 0.05 },
  belt:   { primaryStat:'maxHp',     baseStat0: 8    },
  boots:  { primaryStat:'moveSpeed', baseStat0: 0.08 },
  amulet: { primaryStat:'crit',      baseStat0: 0.05 },
  ring:   { primaryStat:'dmg',       baseStat0: 2.0  },
};

function levelFactor(level){
  // (L-1)/99 elevado a LEVEL_CURVE_EXP. Lv.1=0, Lv.100=1.
  if(level <= 1) return 0;
  if(level >= MAX_ITEM_LEVEL) return 1;
  return Math.pow((level - 1) / (MAX_ITEM_LEVEL - 1), LEVEL_CURVE_EXP);
}

function baseStat(slotKey, eraIdx, level){
  // §3.2 — baseStat0 × ERA_MULT^(era-1) × (1 + levelFactor × WITHIN_GROWTH)
  const def = SLOTS_DEF[slotKey];
  if(!def) return 0;
  return def.baseStat0
       * Math.pow(ERA_MULT, eraIdx)
       * (1 + levelFactor(level) * WITHIN_GROWTH);
}

function substatValue(maxValue, rollQuality, level){
  // §4.1 — max × roll × (FLOOR + RANGE × levelFactor)
  const mult = SUBSTAT_LEVEL_FLOOR + SUBSTAT_LEVEL_RANGE * levelFactor(level);
  return maxValue * rollQuality * mult;
}

function rollSubstatQuality(combo){
  // §4.2 — devolve fração 0..1 fixa no momento da forja
  const pct = (combo.mult - 1.5) / 9;
  const low  = pct * 0.6;
  const high = 0.4 + pct * 0.6;
  return Math.max(0.01, low + Math.random() * (high - low));
}

function rollSubstatQualities(slotCount, combo){
  if(slotCount <= 0) return [];
  const pool = [...SUBSTATS];
  const result = [];
  for(let i=0; i<slotCount && pool.length; i++){
    const idx = (Math.random() * pool.length) | 0;
    const type = pool.splice(idx, 1)[0];
    result.push({
      id: type.id, name: type.name, max: type.max, unit: type.unit,
      rollQuality: rollSubstatQuality(combo),
    });
  }
  return result;
}

function rollInitialLevel(combo){
  // §6.1 — combo determina o ponto de partida; forge_level NÃO afeta level inicial
  const pct = (combo.mult - 1.5) / 9;
  const baseStart = Math.round(pct * INITIAL_LVL_PERCENTILE_MULT + INITIAL_LVL_BASE_OFFSET);
  const variance  = Math.round(pct * INITIAL_LVL_VARIANCE_MULT + INITIAL_LVL_VARIANCE_BASE);
  const rand = ((Math.random() * (variance*2 + 1)) | 0) - variance;
  return Math.max(1, Math.min(MAX_ITEM_LEVEL, baseStart + rand));
}

function upgradeCost(eraIdx, currentLevel){
  // §5.2 — Infinity se já está no max
  if(currentLevel >= MAX_ITEM_LEVEL) return Infinity;
  const eraFactor = Math.pow(ESSENCE_ERA_MULT, eraIdx);
  const lvlFactor = 1 + Math.pow(currentLevel / MAX_ITEM_LEVEL, 2) * COST_LEVEL_FACTOR;
  return Math.ceil(BASE_ESSENCE * eraFactor * lvlFactor);
}

function totalUpgradeCost(eraIdx, fromLevel, toLevel){
  fromLevel = fromLevel || 1;
  toLevel = Math.min(MAX_ITEM_LEVEL, toLevel || MAX_ITEM_LEVEL);
  let total = 0;
  for(let l = fromLevel; l < toLevel; l++){
    const c = upgradeCost(eraIdx, l);
    if(!isFinite(c)) break;
    total += c;
  }
  return total;
}

// Tenta upar 1 nível. Retorna {success, reason, costPaid?, newLevel?}.
function tryUpgradeItem(item){
  if(!item) return { success:false, reason:'NO_ITEM' };
  if(item.currentLevel >= (item.maxLevel || MAX_ITEM_LEVEL)){
    return { success:false, reason:'MAX_LEVEL' };
  }
  const cost = upgradeCost(item.eraIdx, item.currentLevel);
  if(arena.carrots < cost){
    return { success:false, reason:'INSUFFICIENT_ESSENCES', needed: cost };
  }
  arena.carrots -= cost;
  item.currentLevel += 1;
  return { success:true, costPaid: cost, newLevel: item.currentLevel };
}

// Display helpers (sempre chamar via essas, nunca usar value bruto)
function getDisplayedBaseStat(item){
  if(!item) return 0;
  return baseStat(item.slot, item.eraIdx, item.currentLevel || item.level || 1);
}
function getDisplayedSubstats(item){
  if(!item || !item.substats) return [];
  return item.substats.map(s=>{
    const value = substatValue(s.max, s.rollQuality || 0, item.currentLevel || 1);
    return {
      id: s.id, name: s.name, unit: s.unit,
      value: Math.round(value * 10) / 10,
      rollQuality: s.rollQuality,
      percentOfMax: Math.round((s.rollQuality || 0) * 100),
    };
  });
}

function getEraProbabilities(forgeLvl){
  // peso(era) = max(0.5, 100·exp(-(lvl-(unlock+4))²/8)) se lvl≥unlock, senão 0
  const weights = ERAS.map(era=>{
    if(forgeLvl < era.unlock) return 0;
    const dist = forgeLvl - (era.unlock + ERA_PEAK_OFFSET);
    return Math.max(ERA_MIN_WEIGHT, 100 * Math.exp(-(dist*dist)/ERA_VARIANCE));
  });
  const total = weights.reduce((a,b)=>a+b, 0);
  return weights.map(w => total > 0 ? (w/total) : 0);
}

function sampleEra(forgeLvl){
  const probs = getEraProbabilities(forgeLvl);
  let r = Math.random();
  for(let i=0; i<probs.length; i++){
    r -= probs[i];
    if(r <= 0) return i;
  }
  return ERAS.length - 1;
}

function applyTierUp(baseEraIdx, combo){
  let eraIdx = baseEraIdx;
  let tiersUp = 0;
  if(Math.random() < combo.tierUp && eraIdx < ERAS.length - 1){
    eraIdx++; tiersUp++;
    if(combo.doubleUp > 0 && Math.random() < combo.doubleUp && eraIdx < ERAS.length - 1){
      eraIdx++; tiersUp++;
    }
  }
  return { eraIdx, tiersUp };
}

function rollSubstatValue(maxValue, combo){
  // percentil 0..1 mapeado de mult 1.5..10.5
  const pct = (combo.mult - 1.5) / 9;
  const low  = Math.max(1, pct * maxValue * 0.6);
  const high = maxValue * (0.4 + pct * 0.6);
  return Math.max(1, Math.round(low + Math.random() * (high - low)));
}

// Pipeline completo (design-level-scaling.md §8.2):
//  - level inicial vem do combo via rollInitialLevel
//  - substats armazenam rollQuality (0..1), valor é função do currentLevel
//  - currentLevel é mutável via tryUpgradeItem; maxLevel = MAX_ITEM_LEVEL
function generateForgedItem(forgeLvl, combo, slotOverride){
  // 1. template (icon / nome / stat primário) — slot define o stat primário,
  //    o template só serve pra ícone/nome flavor
  const pool = slotOverride
    ? ARENA_ITEM_POOL.filter(p => p.slot === slotOverride)
    : ARENA_ITEM_POOL;
  const def = pool[(Math.random() * pool.length) | 0] || ARENA_ITEM_POOL[0];

  // 2. era base (gaussiana por forge level)
  const baseEraIdx = sampleEra(forgeLvl);
  // 3. tier-up
  const { eraIdx, tiersUp } = applyTierUp(baseEraIdx, combo);
  const era = ERAS[eraIdx];

  // 4. nível inicial (NOVA fórmula, design-level-scaling §6)
  const initialLevel = rollInitialLevel(combo);
  // 5. substats com rollQuality fixo (design-level-scaling §4.2)
  const substats = rollSubstatQualities(era.substats, combo);

  // slot define stat primário (não mais o template)
  const slotDef = SLOTS_DEF[def.slot] || { primaryStat: def.stat, baseStat0: def.base };

  return {
    // visual / metadados
    slot: def.slot,
    name: def.name,
    icon: def.icon,
    weaponType: def.weaponType,
    // stat primário do slot (substitui def.stat/def.base)
    stat: slotDef.primaryStat,
    // value mantido como cache do baseStat atual (recalculado quando level muda
    // via tryUpgradeItem — ver onItemLevelChanged abaixo)
    value: baseStat(def.slot, eraIdx, initialLevel),
    // era (shim rarity pra código antigo)
    rarity: era.key,
    era: era.name,
    eraKey: era.key,
    eraIdx,
    eraColor: era.color,
    originalEraIdx: baseEraIdx,
    tiersUp,
    // novo: level scaling
    currentLevel: initialLevel,
    initialLevel,
    maxLevel: MAX_ITEM_LEVEL,
    level: initialLevel, // alias antigo
    substats, // cada um tem rollQuality (0..1) fixo
    // meta da forja
    combo: combo.name,
    comboId: combo.id,
    multiplier: combo.mult,
    forgeLevel: forgeLvl,
  };
}

// Recalcula item.value quando level mudar (chamado após tryUpgradeItem).
// Mantém sincronia entre currentLevel e o cache de value usado em arenaTotalStat.
function refreshItemValue(item){
  if(!item) return;
  item.value = baseStat(item.slot, item.eraIdx, item.currentLevel);
  item.level = item.currentLevel; // mantém alias
}

// Retorna os indices dos dados que participam do combo atual.
// `diceValues` é um array de números 1..6 (não de objetos).
function getComboDiceIndices(diceValues, comboId){
  if(!comboId || comboId === 'NONE' || comboId === 'MAXROLL') return [];
  // mapa valor → [índices]
  const groups = {};
  for(let i=0; i<diceValues.length; i++){
    const v = diceValues[i];
    if(!groups[v]) groups[v] = [];
    groups[v].push(i);
  }
  const indices = [];
  if(comboId === 'FIVE' || comboId === 'FULL'){
    // todos os dados participam
    return diceValues.map((_,i)=>i);
  }
  if(comboId === 'FOUR'){
    for(const v in groups) if(groups[v].length === 4) return groups[v];
    return [];
  }
  if(comboId === 'THREE'){
    for(const v in groups) if(groups[v].length === 3) return groups[v];
    return [];
  }
  if(comboId === 'TWOPAIR'){
    for(const v in groups){
      if(groups[v].length === 2) indices.push(...groups[v]);
    }
    return indices;
  }
  if(comboId === 'PAIR'){
    for(const v in groups){
      if(groups[v].length === 2) return groups[v];
    }
    return [];
  }
  if(comboId === 'STRAIGHT'){
    // qualquer dado cujo valor esteja num run de 4 consecutivos
    const distinct = Object.keys(groups).map(Number).sort((a,b)=>a-b);
    const inSeq = new Set();
    for(let i=0; i<=distinct.length-4; i++){
      if(distinct[i+1] === distinct[i]+1
      && distinct[i+2] === distinct[i]+2
      && distinct[i+3] === distinct[i]+3){
        for(let k=0; k<4; k++) inSeq.add(distinct[i+k]);
      }
    }
    for(const v of inSeq) indices.push(...groups[v]);
    return indices;
  }
  return [];
}

  power: 0,
  powerDelta: 0,
  powerDeltaTimer: 0,
  powerPulseTimer: 0,
  particles:[],
  items:{ weapon:null, helmet:null, armor:null, gloves:null, belt:null, boots:null, amulet:null, ring:null },
  // base stats (modificados por items + upgrades)
  baseDmg:5, baseAtkSpeed:1.0, baseMoveSpeed:0.616, baseMaxHp:100,
  baseProjectiles:1, baseCrit:0, baseDodge:0, baseXpMult:1, basePickupRange:50,
  startTime:0,
  killCount:0,
  // wave/stage system (estilo LoM + Forge Master)
  stage: 1,
  wave: 1,
  maxStageReached: 1,
  waveState: 'spawning', // 'spawning' | 'fighting' | 'transitioning' | 'stage_clear'
  waveEnemiesToSpawn: 0,

  waveTransitionTimer: 0,
  stageClearBannerTimer: 0,
  deathBannerTimer: 0,
  // se já perdeu pro boss da stage atual, pode tentar de novo via botão
  failedBossCurrentStage: false,
  // hook 4X: regiões "conquistadas" — só counter por enquanto, expansível
  regions:0,
};

function arenaTotalStat(name){
  let value = arena['base'+name[0].toUpperCase()+name.slice(1)] || 0;
  for(const slot of ARENA_SLOTS){
    const it = arena.items[slot];
    if(!it) continue;
    // 1. stat primário do item (escalado por era × level via baseStat)
    if(it.stat === name){
      // usa cache quando consistente, ou recalcula direto pra evitar drift
      value += (it.currentLevel != null)
        ? baseStat(it.slot, it.eraIdx, it.currentLevel)
        : (it.value || 0);
    }
    // 2. substats convertidos: agora valor escala com currentLevel via substatValue
    if(it.substats && it.substats.length){
      const lvl = it.currentLevel || it.level || 1;
      for(const s of it.substats){
        const conv = SUBSTAT_TO_ARENA[s.id];
        if(!conv) continue;
        // se substat tem rollQuality (novo schema), computa valor pelo level;
        // senão usa s.value (backward compat com items antigos sem rollQuality)
        const v = (s.rollQuality != null)
          ? substatValue(s.max, s.rollQuality, lvl)
          : (s.value || 0);
        const add = conv(v);
        if(add[name]) value += add[name];
      }
    }
  }
  return value;
}

// Power Score agregado — soma todas as stats com pesos
function arenaPower(){
  return Math.round(
    arenaTotalStat('dmg')         * 10 +
    arenaTotalStat('maxHp')       * 1  +
    arenaTotalStat('atkSpeed')    * 60 +
    arenaTotalStat('moveSpeed')   * 50 +
    arenaTotalStat('crit')        * 220 +
    arenaTotalStat('dodge')       * 200 +
    arenaTotalStat('projectiles') * 80 +
    arenaTotalStat('xpMult')      * 40 +
    arenaTotalStat('pickupRange') * 0.5 +
    arena.level                   * 40
  );
}

function bumpArenaPower(){
  const p = arenaPower();
  const dp = p - arena.power;
  if(dp !== 0){
    // acumula deltas se já tem um voando
    if(arena.powerDeltaTimer > 0) arena.powerDelta += dp;
    else arena.powerDelta = dp;
    arena.powerDeltaTimer = 90; // 1.5s
    arena.power = p;
    if(dp > 0) arena.powerPulseTimer = 30; // 0.5s de pulse
  }
}

const ARENA_ENEMY_DEFS = {
  slime:    { color:'#4cf08e', r:9,  hp:8,  speed:0.55, dmg:8,  xp:1 },
  bat:      { color:'#a86bff', r:8,  hp:5,  speed:0.95, dmg:6,  xp:1 },
  skeleton: { color:'#fff7e0', r:9,  hp:14, speed:0.7,  dmg:10, xp:2 },
  knight:   { color:'#9b8fc4', r:11, hp:28, speed:0.45, dmg:14, xp:3 },
  boss:     { color:'#ff5252', r:18, hp:120,speed:0.35, dmg:22, xp:10 },
};

// ====== WAVE / STAGE SYSTEM ======
const WAVES_PER_STAGE = 5; // 4 normais + 1 boss
function enemiesPerWave(stage){
  // cresce levemente conforme stage; piso de 4 e teto de 12
  return Math.min(12, 4 + Math.floor((stage-1)/2));
}
function waveSpawnInterval(stage){
  // intervalo entre spawns dentro de uma wave; mais rápido em stages altos
  return Math.max(18, 50 - stage*2);
}
function stageScale(stage){
  // HP/dano dos inimigos escala 15% por stage
  return Math.pow(1.15, stage-1);
}
function stagePool(stage){
  // tier de inimigos por stage
  const pool = ['slime','slime'];
  if(stage >= 2) pool.push('slime','bat');
  if(stage >= 3) pool.push('bat');
  if(stage >= 5) pool.push('skeleton');
  if(stage >= 8) pool.push('skeleton','knight');
  if(stage >= 12) pool.push('knight','skeleton');
  if(stage >= 16) pool.push('knight','knight');
  return pool;
}
function stageLabel(s){
  // formato X-Y (chapter-stage), 5 stages por chapter
  const chapter = Math.ceil(s / 5);
  const within = ((s-1) % 5) + 1;
  return `${chapter}-${within}`;
}

function startNewWave(){
  arena.waveState = 'spawning';
  if(arena.wave === WAVES_PER_STAGE){
    // wave de boss
    spawnArenaBoss();
    arena.waveEnemiesToSpawn = 0;
    arena.waveState = 'fighting';
  } else {
    arena.waveEnemiesToSpawn = enemiesPerWave(arena.stage);
    arena.waveSpawnTimer = 20;
  }
}

function onWaveClear(){
  if(arena.wave === WAVES_PER_STAGE){
    // boss derrotado → stage clear, avança
    arena.waveState = 'stage_clear';
    arena.stageClearBannerTimer = 120;
    arena.lettuce += 5 + arena.stage;
    spawnArenaParticle(arena.bx, arena.by, '#ffcc3d', 36);
    arena.regions++;
  } else if(arena.wave === 4){
    // wave 4 limpa: avança pro boss automaticamente NA PRIMEIRA TENTATIVA.
    // Se já tinha perdido pra esse boss, entra em loop e espera o player
    // clicar "DESAFIAR BOSS".
    if(arena.failedBossCurrentStage){
      arena.wave = 1;
      startNewWave();
    } else {
      arena.wave = WAVES_PER_STAGE;
      startNewWave();
    }
  } else {
    // waves 1-3 → próxima
    arena.wave++;
    startNewWave();
  }
}

function challengeBoss(){
  if(state !== STATE.ARENA_PLAY) return;
  if(arena.wave === WAVES_PER_STAGE) return; // já tá no boss
  // limpa inimigos atuais, projéteis e effects de combate
  arena.enemies = [];
  arena.swings = [];
  arena.effects = arena.effects.filter(ef => ef.kind === 'orbiter');
  // pula direto pra wave do boss
  arena.wave = WAVES_PER_STAGE;
  startNewWave();
}

function onArenaDeath(){
  // sem game over — volta pra wave 1 do stage atual com HP cheio
  // se morreu lutando o boss, marca pra desbloquear o botão "DESAFIAR BOSS"
  if(arena.wave === WAVES_PER_STAGE){
    arena.failedBossCurrentStage = true;
  }
  arena.hp = arena.maxHp;
  arena.enemies = [];
  arena.swings = [];
  arena.effects = arena.effects.filter(ef => ef.kind === 'orbiter');
  arena.gems = [];
  arena.bx = (ARENA.LEFT_X + ARENA.RIGHT_X)/2;
  arena.by = (ARENA.TOP_Y + ARENA.BOT_Y)/2;
  arena.vx = 0; arena.vy = 0;
  arena.hurtTimer = 60; // invuln no respawn
  arena.wave = 1;
  arena.deathBannerTimer = 90;
  startNewWave();
  spawnArenaParticle(arena.bx, arena.by, '#ff5252', 30);
}

function tickArenaWave(){
  if(arena.waveState === 'stage_clear'){
    arena.stageClearBannerTimer--;
    if(arena.stageClearBannerTimer <= 0){
      arena.stage++;
      arena.maxStageReached = Math.max(arena.maxStageReached, arena.stage);
      arena.wave = 1;
      arena.failedBossCurrentStage = false; // novo stage, sem fail registrado
      startNewWave();
    }
    return;
  }
  if(arena.waveState === 'spawning'){
    if(arena.waveEnemiesToSpawn > 0){
      arena.waveSpawnTimer--;
      if(arena.waveSpawnTimer <= 0){
        spawnArenaEnemy();
        arena.waveEnemiesToSpawn--;
        arena.waveSpawnTimer = waveSpawnInterval(arena.stage);
      }
    } else {
      arena.waveState = 'fighting';
    }
    return;
  }
  if(arena.waveState === 'fighting'){
    if(arena.enemies.length === 0){
      onWaveClear();
    }
  }
}

function spawnArenaEnemy(){
  const pool = stagePool(arena.stage);
  const kind = pool[(Math.random()*pool.length)|0];
  const def = ARENA_ENEMY_DEFS[kind];
  // spawna em borda aleatória
  const side = (Math.random()*4)|0;
  let x,y;
  if(side===0){ x = ARENA.LEFT_X-10; y = ARENA.TOP_Y + Math.random()*(ARENA.BOT_Y-ARENA.TOP_Y); }
  else if(side===1){ x = ARENA.RIGHT_X+10; y = ARENA.TOP_Y + Math.random()*(ARENA.BOT_Y-ARENA.TOP_Y); }
  else if(side===2){ x = ARENA.LEFT_X + Math.random()*(ARENA.RIGHT_X-ARENA.LEFT_X); y = ARENA.TOP_Y-10; }
  else { x = ARENA.LEFT_X + Math.random()*(ARENA.RIGHT_X-ARENA.LEFT_X); y = ARENA.BOT_Y+10; }
  const scale = stageScale(arena.stage);
  arena.enemies.push({
    kind, x, y, r:def.r,
    hp: Math.round(def.hp*scale), maxHp: Math.round(def.hp*scale),
    speed: def.speed,
    dmg: Math.round(def.dmg*scale*0.8),
    xp: Math.round(def.xp * (1 + (arena.stage-1)*0.1)),
    color: def.color,
    hurtTimer: 0,
  });
}

function spawnArenaBoss(){
  const def = ARENA_ENEMY_DEFS.boss;
  const scale = stageScale(arena.stage) * 1.2;
  arena.enemies.push({
    kind:'boss',
    x: W/2, y: ARENA.TOP_Y-20,
    r:def.r,
    hp: Math.round(def.hp*scale), maxHp: Math.round(def.hp*scale),
    speed: def.speed, dmg: Math.round(def.dmg*scale),
    xp: def.xp, color: def.color, hurtTimer:0, isBoss:true,
  });
  spawnArenaParticle(W/2, ARENA.TOP_Y, '#ff5252', 24);
}

// Mantido como shim pra qualquer chamada antiga — rolagem direta sem combo
// só seria usada via cheats/debug. Combo padrão: MAXROLL.
function rollItem(){
  return generateForgedItem(arena.forgeLevel, COMBO_DATA.MAXROLL);
}

function spawnArenaParticle(x,y,color,count){
  for(let i=0;i<count;i++){
    arena.particles.push({
      x,y,
      vx:(Math.random()-0.5)*3,
      vy:(Math.random()-0.5)*3,
      life:18+((Math.random()*8)|0),
      color,
    });
  }
}

function arenaEquipItem(item){
  const cur = arena.items[item.slot];
  // se não tem item OU o novo é melhor (raridade > ou valor da mesma stat >)
  if(!cur){
    arena.items[item.slot] = item;
    return true;
  }
  const curRank = Object.keys(RARITY).indexOf(cur.rarity);
  const newRank = Object.keys(RARITY).indexOf(item.rarity);
  if(newRank > curRank || (newRank===curRank && item.value > cur.value)){
    arena.items[item.slot] = item;
    return true;
  }
  return false;
}

function killArenaEnemy(idx, e){
  if(idx < 0){
    idx = arena.enemies.indexOf(e);
    if(idx < 0) return;
  }
  arena.gems.push({ x:e.x, y:e.y, vx:0, vy:0, xp:e.xp, age:0 });
  // (item drop removido — items só são obtidos via forge dice)
  // dropa cenouras como gem coletável
  // alface = fuel da forja (era a antiga "carrots") — drop 1 por inimigo normal, 10 boss
  const lettuceAmt = e.isBoss ? 10 : 1;
  arena.gems.push({ x:e.x-6, y:e.y-6, vx:0, vy:0, lettuce:lettuceAmt, isLettuce:true, age:0 });
  // cenoura = currency pra upgrade de item level — bosses dão muito mais
  const carrotAmt = e.isBoss ? 20 : 1;
  arena.gems.push({ x:e.x+6, y:e.y-4, vx:0, vy:0, carrot:carrotAmt, isCarrot:true, age:0 });
  arena.killCount++;
  if(e.isBoss){
    arena.regions++;
    spawnArenaParticle(e.x, e.y, '#ff5252', 30);
  } else {
    spawnArenaParticle(e.x, e.y, e.color, 14);
  }
  arena.enemies.splice(idx,1);
}


function updateArenaEffects(){
  for(let i=arena.effects.length-1;i>=0;i--){
    const ef = arena.effects[i];
    ef.frame++;

    if(ef.kind === 'delayed'){
      if(ef.frame >= ef.framesLeft){ ef.fn(); arena.effects.splice(i,1); continue; }
    }
    else if(ef.kind === 'shockwave'){
      const t = ef.frame / ef.lifeFrames;
      ef.r = ef.maxR * t;
      for(let j=arena.enemies.length-1;j>=0;j--){
        const e = arena.enemies[j];
        if(ef.hit.has(e)) continue;
        const d = Math.hypot(e.x-ef.x, e.y-ef.y);
        if(d < ef.r){
          e.hp -= ef.dmg;
          e.hurtTimer = 6;
          ef.hit.add(e);
          const ang = Math.atan2(e.y-ef.y, e.x-ef.x);
          e.x += Math.cos(ang)*8;
          e.y += Math.sin(ang)*8;
          spawnArenaParticle(e.x, e.y, '#5fb0d8', 6);
          if(e.hp <= 0) killArenaEnemy(j, e);
        }
      }
    }
    else if(ef.kind === 'beam'){
      ef.x += ef.vx; ef.y += ef.vy;
      for(let j=arena.enemies.length-1;j>=0;j--){
        const e = arena.enemies[j];
        if(ef.hit.has(e)) continue;
        const d = Math.hypot(e.x-ef.x, e.y-ef.y);
        if(d < e.r + 7){
          e.hp -= ef.dmg;
          e.hurtTimer = 6;
          ef.hit.add(e);
          spawnArenaParticle(e.x, e.y, '#a86bff', 6);
          if(e.hp <= 0) killArenaEnemy(j, e);
        }
      }
    }
    else if(ef.kind === 'rangedProj'){
      ef.x += ef.vx; ef.y += ef.vy;
      // colisão: para no primeiro inimigo, gasta o projétil
      for(let j=arena.enemies.length-1;j>=0;j--){
        const e = arena.enemies[j];
        if(ef.hit.has(e)) continue;
        const d = Math.hypot(e.x-ef.x, e.y-ef.y);
        if(d < e.r + 4){
          const isCrit = Math.random() < ef.crit;
          const dmg = isCrit ? Math.round(ef.dmg*2) : ef.dmg;
          e.hp -= dmg;
          e.hurtTimer = 6;
          ef.hit.add(e);
          spawnArenaParticle(e.x, e.y, isCrit ? '#ff5fa2' : '#ff7a1a', 6);
          ef.frame = ef.lifeFrames; // marca pra remover
          if(e.hp <= 0) killArenaEnemy(j, e);
          break;
        }
      }
      // remove se sair da arena
      if(ef.x < ARENA.LEFT_X-20 || ef.x > ARENA.RIGHT_X+20 ||
         ef.y < ARENA.TOP_Y-20 || ef.y > ARENA.BOT_Y+20){
        ef.frame = ef.lifeFrames;
      }
    }
    else if(ef.kind === 'orbiter'){
      ef.angle += 0.15;
      ef.x = arena.bx + Math.cos(ef.angle) * ef.radius;
      ef.y = arena.by + Math.sin(ef.angle) * ef.radius;
      for(let j=arena.enemies.length-1;j>=0;j--){
        const e = arena.enemies[j];
        const d = Math.hypot(e.x-ef.x, e.y-ef.y);
        if(d < e.r + 8){
          const last = ef.lastHit.get(e) || -100;
          if(ef.frame - last > 18){
            e.hp -= ef.dmg;
            e.hurtTimer = 6;
            ef.lastHit.set(e, ef.frame);
            spawnArenaParticle(e.x, e.y, '#5fb0d8', 4);
            if(e.hp <= 0) killArenaEnemy(j, e);
          }
        }
      }
    }
    else if(ef.kind === 'meteor'){
      if(ef.frame < ef.lifeFrames - 8){
        const t = ef.frame/(ef.lifeFrames-8);
        ef.x = ef.x + (ef.targetX - ef.x) * 0.15;
        ef.y = ef.y + (ef.targetY - ef.y) * (0.05 + t*0.2);
      } else if(!ef.exploded){
        ef.exploded = true;
        spawnArenaParticle(ef.targetX, ef.targetY, '#ff5252', 30);
        spawnArenaParticle(ef.targetX, ef.targetY, '#ffcc3d', 20);
        spawnArenaParticle(ef.targetX, ef.targetY, '#fff7e0', 10);
        for(let j=arena.enemies.length-1;j>=0;j--){
          const e = arena.enemies[j];
          const d = Math.hypot(e.x-ef.targetX, e.y-ef.targetY);
          if(d < ef.radius){
            e.hp -= ef.dmg;
            e.hurtTimer = 6;
            if(e.hp <= 0) killArenaEnemy(j, e);
          }
        }
      }
    }
    else if(ef.kind === 'nuke'){
      if(!ef.exploded){
        ef.exploded = true;
        for(let j=arena.enemies.length-1;j>=0;j--){
          const e = arena.enemies[j];
          e.hp -= ef.dmg;
          e.hurtTimer = 6;
          spawnArenaParticle(e.x, e.y, '#fff7e0', 12);
          if(e.hp <= 0) killArenaEnemy(j, e);
        }
      }
    }

    if(ef.frame >= ef.lifeFrames){
      arena.effects.splice(i,1);
    }
  }
}

// Ranges por tipo de arma
const MELEE_RANGE = 56;
const RANGED_RANGE = 200;

function getWeaponType(){
  const w = arena.items.weapon;
  return (w && w.weaponType) || 'melee';
}

function arenaAttack(){
  // checa se tem inimigo no range; retorna true se atacou
  const type = getWeaponType();
  const maxRange = type === 'ranged' ? RANGED_RANGE : MELEE_RANGE;
  let best=null, bestD=Infinity;
  for(const e of arena.enemies){
    const dx = e.x - arena.bx, dy = e.y - arena.by;
    const d = Math.hypot(dx, dy);
    if(d > maxRange) continue; // fora do range, não conta
    if(d < bestD){ bestD = d; best = e; }
  }
  if(!best) return false;

  if(type === 'ranged') arenaRangedShot(best);
  else arenaMeleeSwing(best);
  return true;
}

function arenaMeleeSwing(target){
  const targetAngle = Math.atan2(target.y-arena.by, target.x-arena.bx);
  const bladeStat = Math.max(1, Math.round(arenaTotalStat('projectiles')));
  arena.swings.push({
    centerAngle: targetAngle,
    arc:   Math.PI * 0.85 + (bladeStat-1) * 0.20,
    range: 38 + bladeStat * 6,
    frame: 0, lifeFrames: 6,
    dmg: arenaTotalStat('dmg'),
    crit: arenaTotalStat('crit'),
    dir: Math.random()<0.5 ? -1 : 1,
    hit: new Set(),
  });
  // swish blast
  const startAngle = targetAngle - 0.4 * (Math.random()<0.5?-1:1);
  for(let i=0;i<6;i++){
    const a = startAngle + (Math.random()-0.5)*0.6;
    const sp = 3 + Math.random()*3;
    arena.particles.push({
      x: arena.bx + Math.cos(a)*12,
      y: arena.by + Math.sin(a)*12,
      vx: Math.cos(a)*sp,
      vy: Math.sin(a)*sp,
      life: 8 + ((Math.random()*4)|0),
      color: i%2===0 ? '#ffcc3d' : '#ff9b3a',
    });
  }
}

function arenaRangedShot(target){
  const angle = Math.atan2(target.y-arena.by, target.x-arena.bx);
  const projCount = Math.max(1, Math.round(arenaTotalStat('projectiles')));
  const dmg = arenaTotalStat('dmg');
  const crit = arenaTotalStat('crit');
  for(let i=0;i<projCount;i++){
    const spread = (i - (projCount-1)/2) * 0.18;
    const a = angle + spread;
    arena.effects.push({
      kind:'rangedProj',
      x: arena.bx, y: arena.by,
      vx: Math.cos(a) * 6.5,
      vy: Math.sin(a) * 6.5,
      angle: a,
      dmg, crit,
      frame:0, lifeFrames: 45,
      hit: new Set(),
    });
  }
  // muzzle flash leve
  for(let i=0;i<3;i++){
    arena.particles.push({
      x: arena.bx + Math.cos(angle)*10,
      y: arena.by + Math.sin(angle)*10,
      vx: Math.cos(angle)*(2+Math.random()),
      vy: Math.sin(angle)*(2+Math.random()),
      life: 8, color:'#ffcc3d',
    });
  }
}

function computeArenaAI(){
  // ===== anti-stuck: detecta se não está se movendo e força escape =====
  arena._aiFrame = (arena._aiFrame || 0) + 1;
  if(arena._aiLastX === undefined){ arena._aiLastX = arena.bx; arena._aiLastY = arena.by; }
  arena._aiStuckTimer = arena._aiStuckTimer || 0;
  arena._aiEscape = arena._aiEscape || 0;
  arena._aiEscapeDir = arena._aiEscapeDir || { x:0, y:0 };

  if(arena._aiFrame % 24 === 0){
    const moved = Math.hypot(arena.bx - arena._aiLastX, arena.by - arena._aiLastY);
    if(moved < 6){
      arena._aiStuckTimer++;
      if(arena._aiStuckTimer >= 2){
        const cx = (ARENA.LEFT_X + ARENA.RIGHT_X)/2;
        const cy = (ARENA.TOP_Y + ARENA.BOT_Y)/2;
        const cdx = cx - arena.bx, cdy = cy - arena.by;
        const m = Math.hypot(cdx, cdy) || 1;
        arena._aiEscape = 35;
        // pula direto pro centro com jitter pra não bater no inimigo de novo
        arena._aiEscapeDir = {
          x: cdx/m + (Math.random()-0.5)*0.8,
          y: cdy/m + (Math.random()-0.5)*0.8
        };
        arena._aiStuckTimer = 0;
      }
    } else {
      arena._aiStuckTimer = 0;
    }
    arena._aiLastX = arena.bx;
    arena._aiLastY = arena.by;
  }

  if(arena._aiEscape > 0){
    arena._aiEscape--;
    // _aiEscapeDir é armazenado como {x,y} — converte pra {dx,dy} no return
    // pra bater com o shape esperado pelo updateArena (que lê .dx/.dy).
    return { dx: arena._aiEscapeDir.x, dy: arena._aiEscapeDir.y };
  }

  // ===== combate normal =====
  const swordRange = 38 + Math.max(1, Math.round(arenaTotalStat('projectiles'))) * 6;
  const idealNear = 34;
  const idealFar  = Math.max(46, swordRange - 8);
  const dangerR   = 60;

  let nearest=null, nearestD=Infinity;
  let fleeX=0, fleeY=0, dangerCount=0;
  for(const e of arena.enemies){
    const ddx = arena.bx - e.x, ddy = arena.by - e.y;
    const d = Math.hypot(ddx, ddy);
    if(d < nearestD){ nearestD = d; nearest = e; }
    if(d < dangerR && d > 0.1){
      const w = (dangerR - d) / dangerR;
      fleeX += (ddx/d) * w;
      fleeY += (ddy/d) * w;
      dangerCount++;
    }
  }

  let dx=0, dy=0;
  if(nearest){
    const tdx = nearest.x - arena.bx, tdy = nearest.y - arena.by;
    const d = nearestD || 0.001;
    if(d < idealNear){
      dx = -tdx/d; dy = -tdy/d;
    } else if(d > idealFar){
      dx = tdx/d; dy = tdy/d;
    } else {
      // kiting perpendicular: escolhe direção que afasta das bordas
      const px = -tdy/d, py =  tdx/d;
      const cx = (ARENA.LEFT_X + ARENA.RIGHT_X)/2;
      const cy = (ARENA.TOP_Y + ARENA.BOT_Y)/2;
      const towardCenterDot = px*(cx-arena.bx) + py*(cy-arena.by);
      const sign = towardCenterDot >= 0 ? 1 : -1;
      dx = px * 0.6 * sign;
      dy = py * 0.6 * sign;
    }
  }

  if(dangerCount > 0){
    const fleeMag = Math.min(1, dangerCount * 0.4);
    dx += fleeX * fleeMag;
    dy += fleeY * fleeMag;
  }

  // coleta XP gems quando seguro
  if(dangerCount === 0 || nearestD > 70){
    let bestGem=null, bestGemD=Infinity;
    for(const g of arena.gems){
      const d = Math.hypot(g.x-arena.bx, g.y-arena.by);
      if(d < bestGemD){ bestGemD = d; bestGem = g; }
    }
    if(bestGem && bestGemD > (arena.basePickupRange + arenaTotalStat('pickupRange') - 10)){
      const gx = bestGem.x - arena.bx, gy = bestGem.y - arena.by;
      const d = Math.hypot(gx, gy) || 1;
      dx += (gx/d) * 0.4;
      dy += (gy/d) * 0.4;
    }
  }

  // ===== repulsão contínua das bordas (mais forte em cantos) =====
  // gradiente suave: quanto mais perto da borda, mais forte o empurrão
  const edgeMargin = 65;
  const lx = arena.bx - ARENA.LEFT_X;
  const rx = ARENA.RIGHT_X - arena.bx;
  const ty = arena.by - ARENA.TOP_Y;
  const by2 = ARENA.BOT_Y - arena.by;
  let epX = 0, epY = 0;
  if(lx < edgeMargin)  epX += Math.pow((edgeMargin - lx) / edgeMargin, 1.6);
  if(rx < edgeMargin)  epX -= Math.pow((edgeMargin - rx) / edgeMargin, 1.6);
  if(ty < edgeMargin)  epY += Math.pow((edgeMargin - ty) / edgeMargin, 1.6);
  if(by2 < edgeMargin) epY -= Math.pow((edgeMargin - by2) / edgeMargin, 1.6);
  // peso forte da repulsão de borda — domina o vetor quando muito perto
  dx += epX * 2.2;
  dy += epY * 2.2;

  // ===== bias suave pro centro quando está longe dele =====
  const cx = (ARENA.LEFT_X + ARENA.RIGHT_X)/2;
  const cy = (ARENA.TOP_Y + ARENA.BOT_Y)/2;
  const halfDiag = Math.hypot((ARENA.RIGHT_X-ARENA.LEFT_X)/2, (ARENA.BOT_Y-ARENA.TOP_Y)/2);
  const dFromCenter = Math.hypot(arena.bx-cx, arena.by-cy);
  const centerRatio = dFromCenter / halfDiag; // 0..1
  if(centerRatio > 0.55){
    const w = (centerRatio - 0.55) / 0.45; // 0..1 conforme se afasta
    const cdx = cx - arena.bx, cdy = cy - arena.by;
    const m = Math.hypot(cdx, cdy) || 1;
    dx += (cdx/m) * w * 0.5;
    dy += (cdy/m) * w * 0.5;
  }

  return { dx, dy };
}

function updateArena(){
  // input movement
  let dx = 0, dy = 0;
  if(arena.autoMove){
    const ai = computeArenaAI();
    dx = +ai.dx || 0; dy = +ai.dy || 0;
  } else if(input.active){
    dx = input.axisX || 0;
    dy = input.axisY || 0;
  } else {
    // teclado
    if(keys['ArrowLeft']||keys['a']) dx -= 1;
    if(keys['ArrowRight']||keys['d']) dx += 1;
    if(keys['ArrowUp']||keys['w']) dy -= 1;
    if(keys['ArrowDown']||keys['s']) dy += 1;
  }
  // failsafe: se dx/dy chegou NaN/Infinity por algum bug, zera (evita propagar pra arena.bx)
  if(!isFinite(dx)) dx = 0;
  if(!isFinite(dy)) dy = 0;
  const mag = Math.hypot(dx,dy);
  if(mag > 0){ dx/=mag; dy/=mag; }
  const moveSpeed = arena.baseMoveSpeed * (1 + arenaTotalStat('moveSpeed'));
  arena.bx += dx * moveSpeed;
  arena.by += dy * moveSpeed;
  // failsafe extra: se mesmo assim virou NaN (item bugado com value NaN, etc), reseta pro centro
  if(!isFinite(arena.bx) || !isFinite(arena.by)){
    arena.bx = (ARENA.LEFT_X + ARENA.RIGHT_X)/2;
    arena.by = (ARENA.TOP_Y + ARENA.BOT_Y)/2;
  }
  // bounds
  arena.bx = Math.max(ARENA.LEFT_X+ARENA.BUNNY_R, Math.min(ARENA.RIGHT_X-ARENA.BUNNY_R, arena.bx));
  arena.by = Math.max(ARENA.TOP_Y+ARENA.BUNNY_R, Math.min(ARENA.BOT_Y-ARENA.BUNNY_R, arena.by));

  // maxHp via items
  // arenaTotalStat já inclui o arena.baseMaxHp como ponto de partida; somar de
  // novo causaria double-count. Bug pré-existente.
  arena.maxHp = arenaTotalStat('maxHp');
  if(arena.hp > arena.maxHp) arena.hp = arena.maxHp;

  // hurt timer
  if(arena.hurtTimer>0) arena.hurtTimer--;

  // auto-attack (melee swing OU ranged shot, depende da arma)
  // só ativa se houver inimigo no range; senão segura o cooldown
  const atkSpeed = 1 + arenaTotalStat('atkSpeed');
  arena.shootTimer -= atkSpeed;
  if(arena.shootTimer <= 0){
    if(arenaAttack()){
      arena.shootTimer = 50;
    }
    // se nada no range, shootTimer continua <= 0 → tenta de novo no próximo frame
  }

  if(arena.powerDeltaTimer > 0) arena.powerDeltaTimer--;
  if(arena.powerPulseTimer > 0) arena.powerPulseTimer--;
  bumpArenaPower();
  // auto-forge: desabilitado temporariamente (bug nas waves seguintes)
  // if(arena.autoForge && arena.lettuce >= FORGE_COST){
  //   autoForgeStep();
  // }

  // update efeitos especiais
  updateArenaEffects();

  // wave/stage tick — substitui spawn por tempo
  tickArenaWave();

  // enemies behavior + collision
  for(let i=arena.enemies.length-1;i>=0;i--){
    const e = arena.enemies[i];
    const dx2 = arena.bx - e.x, dy2 = arena.by - e.y;
    const d = Math.hypot(dx2, dy2) || 1;
    e.x += (dx2/d) * e.speed;
    e.y += (dy2/d) * e.speed;
    if(e.hurtTimer>0) e.hurtTimer--;
    // damage on contact
    if(d < e.r + ARENA.BUNNY_R && arena.hurtTimer<=0){
      const dodge = arenaTotalStat('dodge');
      if(Math.random() < dodge){
        // esquivou
        spawnArenaParticle(arena.bx, arena.by, '#fff7e0', 6);
      } else {
        arena.hp -= e.dmg;
        arena.hurtTimer = 40;
        spawnArenaParticle(arena.bx, arena.by, '#ff5252', 10);
      }
    }
  }

  // swings (espada de cenoura) — arco rotacionando, dano em quem entrar no caminho
  for(let i=arena.swings.length-1;i>=0;i--){
    const sw = arena.swings[i];
    sw.frame++;
    const t = sw.frame / sw.lifeFrames; // 0..1
    // ângulo da lâmina nesse frame, varrendo o arco
    const swingAngle = sw.centerAngle + sw.dir * (sw.arc/2 - sw.arc * t);
    // hit check em quem ainda não levou desse swing
    for(let j=arena.enemies.length-1;j>=0;j--){
      const e = arena.enemies[j];
      if(sw.hit.has(e)) continue;
      const dx3 = e.x - arena.bx, dy3 = e.y - arena.by;
      const dist = Math.hypot(dx3, dy3);
      if(dist > sw.range + e.r) continue;
      if(dist < ARENA.BUNNY_R) { /* inimigo encostado, sempre acerta */ }
      else {
        const enemyAngle = Math.atan2(dy3, dx3);
        // diff angular wrap-safe
        let diff = enemyAngle - swingAngle;
        while(diff > Math.PI) diff -= Math.PI*2;
        while(diff < -Math.PI) diff += Math.PI*2;
        if(Math.abs(diff) > 0.42) continue; // fora da largura da lâmina
      }
      // acerto!
      const isCrit = Math.random() < sw.crit;
      const dmg = isCrit ? Math.round(sw.dmg*2) : sw.dmg;
      e.hp -= dmg;
      e.hurtTimer = 6;
      spawnArenaParticle(e.x, e.y, isCrit ? '#ff5fa2' : '#ff7a1a', isCrit ? 8 : 5);
      sw.hit.add(e);
      // knockback radial leve
      if(dist > 0.1){
        e.x += (dx3/dist) * 3;
        e.y += (dy3/dist) * 3;
      }
      if(e.hp <= 0){
        // drop XP gem (item drop removido — items só são obtidos via forge dice)
        arena.gems.push({ x:e.x, y:e.y, vx:0, vy:0, xp:e.xp, age:0 });
        arena.killCount++;
        if(e.isBoss){
          arena.regions++;
          spawnArenaParticle(e.x, e.y, '#ff5252', 30);
        } else {
          spawnArenaParticle(e.x, e.y, e.color, 14);
        }
        arena.enemies.splice(j,1);
      }
    }
    if(sw.frame >= sw.lifeFrames) arena.swings.splice(i,1);
  }

  // gems: atrai pro player quando dentro do raio + coleta
  const pickupR = arena.basePickupRange + arenaTotalStat('pickupRange');
  for(let i=arena.gems.length-1;i>=0;i--){
    const g = arena.gems[i];
    g.age++;
    const dxg = arena.bx - g.x, dyg = arena.by - g.y;
    const dg = Math.hypot(dxg, dyg) || 1;
    if(dg < pickupR){
      g.vx += (dxg/dg) * 0.6;
      g.vy += (dyg/dg) * 0.6;
      g.vx *= 0.88; g.vy *= 0.88;
    }
    g.x += g.vx; g.y += g.vy;
    if(dg < ARENA.BUNNY_R + 6){
      if(g.isItem){
        const equipped = arenaEquipItem(g.item);
        if(equipped){
          spawnArenaParticle(arena.bx, arena.by, RARITY[g.item.rarity].color, 20);
        } else {
          arena.xp += 1;
          spawnArenaParticle(arena.bx, arena.by, '#9b8fc4', 6);
        }
      } else if(g.isLettuce){
        arena.lettuce += g.lettuce || 1;
        spawnArenaParticle(arena.bx, arena.by, '#4cf08e', 5);
      } else if(g.isCarrot){
        arena.carrots += g.carrot || 1;
        spawnArenaParticle(arena.bx, arena.by, '#ff7a1a', 5);
      } else {
        const xpGain = g.xp * arenaTotalStat('xpMult');
        arena.xp += xpGain;
        spawnArenaParticle(arena.bx, arena.by, '#4cf08e', 5);
      }
      arena.gems.splice(i,1);
    }
  }

  // level up (sem popup de upgrade — removido pra mover pra outro metagame)
  if(arena.xp >= arena.xpToNext){
    arena.xp -= arena.xpToNext;
    arena.level++;
    arena.xpToNext = Math.round(8 + arena.level*4 + arena.level*arena.level*0.5);
    arena.hp = arena.maxHp; // cura ao subir
    spawnArenaParticle(arena.bx, arena.by, '#ffcc3d', 18);
  }

  // particles
  for(let i=arena.particles.length-1;i>=0;i--){
    const pt = arena.particles[i];
    pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.1; pt.life--;
    if(pt.life<=0) arena.particles.splice(i,1);
  }

  // morte → sem game over, respawn no stage atual com HP cheio
  if(arena.hp <= 0){
    onArenaDeath();
  }
  // ticks de banners
  if(arena.deathBannerTimer > 0) arena.deathBannerTimer--;
}

function enterArenaGameOver(){
  state = STATE.ARENA_GAMEOVER;
  const stats = document.getElementById('arenaGoStats');
  const time = ((performance.now()-arena.startTime)/1000).toFixed(1);
  let itemsHtml = '';
  for(const slot of ARENA_SLOTS){
    const it = arena.items[slot];
    if(it){
      itemsHtml += `<div class="row"><span>${it.icon} ${it.name}</span><span style="color:${RARITY[it.rarity].color}">${RARITY[it.rarity].name}</span></div>`;
    }
  }
  stats.innerHTML = `
    <div class="row"><span>Stage máximo</span><span style="color:#ffcc3d">${stageLabel(arena.maxStageReached)}</span></div>
    <div class="row"><span>Nível</span><span>${arena.level}</span></div>
    <div class="row"><span>Kills</span><span>${arena.killCount}</span></div>
    <div class="row"><span>Bosses derrotados</span><span>${arena.regions}</span></div>
    <div class="row"><span>⚡ Power final</span><span style="color:#ffcc3d">${arena.power}</span></div>
    <div class="row"><span>Tempo</span><span>${time}s</span></div>
    ${itemsHtml}
  `;
  showLayer('arenaGameover');
}

function enterArena(){
  state = STATE.ARENA_PLAY;
  hideAllLayers();
  initArena();
  // reseta strip de forja pra estado idle
  if(typeof openForgeDice === 'function') openForgeDice();
  // reseta tab ativa pra COMBAT
  if(typeof setActiveArenaTab === 'function') setActiveArenaTab('combat');
